name: Feature request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the problem or use case?
      description: What are you trying to do that's hard or impossible today?
      placeholder: When I'm aligning a long clip, I have to ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Lockstep do? Sketches, mockups, or pseudo-UI welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you've worked around this, or other shapes the feature could take.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Timeline
        - Markers
        - Regions
        - Export
        - Warp pipeline
        - UI / layout
        - Settings
        - Other
    validations:
      required: false
