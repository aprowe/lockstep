name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    release:
        permissions:
            contents: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: windows-latest
                      target: x86_64-pc-windows-msvc
                    - platform: macos-latest
                      target: aarch64-apple-darwin
        runs-on: ${{ matrix.platform }}

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - run: npm ci

            - uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: "./src-tauri -> target"
                  key: ${{ matrix.target }}

            - name: Import Windows signing certificate
              if: matrix.platform == 'windows-latest'
              shell: pwsh
              env:
                  WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
                  WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
              run: |
                  if (-not $env:WINDOWS_CERTIFICATE) {
                    Write-Host "WINDOWS_CERTIFICATE secret not set — skipping signing setup."
                    exit 0
                  }
                  $bytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
                  $path  = "$env:RUNNER_TEMP\cert.pfx"
                  [IO.File]::WriteAllBytes($path, $bytes)
                  $pwd  = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
                  $cert = Import-PfxCertificate -FilePath $path -CertStoreLocation Cert:\CurrentUser\My -Password $pwd -Exportable
                  Remove-Item $path -Force
                  "TAURI_SIGNING_WINDOWS_CERTIFICATE_THUMBPRINT=$($cert.Thumbprint)" |
                    Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

            - name: Download FFmpeg binaries — Windows (BtbN static)
              if: matrix.platform == 'windows-latest'
              shell: bash
              run: |
                  # BtbN builds are statically linked — they don't depend on MSVC
                  # runtime DLLs that fresh Windows machines may lack. The ffbinaries
                  # v6.1 Windows builds we used previously were dynamic and failed
                  # to launch on clean installs.
                  mkdir -p src-tauri/binaries
                  curl -L "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -o ffmpeg.zip
                  unzip ffmpeg.zip -d ffmpeg_out
                  FF_DIR=$(find ffmpeg_out -maxdepth 2 -type d -name bin | head -n1)
                  cp "$FF_DIR/ffmpeg.exe" src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
                  cp "$FF_DIR/ffprobe.exe" src-tauri/binaries/ffprobe-x86_64-pc-windows-msvc.exe

            - name: Download rife-ncnn-vulkan — Windows
              if: matrix.platform == 'windows-latest'
              shell: bash
              # The aprowe fork (tag 20260422) adds `-M manifest.json` batch mode
              # which Lockstep's pipeline depends on. Upstream nihui builds don't
              # support it; using them here would silently produce a broken bundle.
              # Must stay in lockstep with scripts/setup-binaries.mjs RIFE_VERSION.
              run: |
                  mkdir -p src-tauri/binaries
                  curl -L "https://github.com/aprowe/rife-ncnn-vulkan/releases/download/20260422/rife-ncnn-vulkan-20260422-windows.zip" -o rife.zip
                  unzip rife.zip -d rife_out
                  RIFE_DIR=$(find rife_out -maxdepth 1 -type d -name "rife-ncnn-vulkan-*" | head -n1)
                  cp "$RIFE_DIR/rife-ncnn-vulkan.exe" src-tauri/binaries/rife-ncnn-vulkan-x86_64-pc-windows-msvc.exe
                  mkdir -p src-tauri/binaries/rife-v4.6
                  cp "$RIFE_DIR/rife-v4.6/flownet.bin" src-tauri/binaries/rife-v4.6/
                  cp "$RIFE_DIR/rife-v4.6/flownet.param" src-tauri/binaries/rife-v4.6/

            - name: Download FFmpeg binaries — macOS arm64 (martin-riedl static)
              if: matrix.platform == 'macos-latest'
              run: |
                  # martin-riedl.de is the BtbN equivalent for macOS arm64: statically
                  # compiled, pre-signed with an Apple Developer ID, no Homebrew deps.
                  # The redirect/latest/ path is a documented CI permalink.
                  mkdir -p src-tauri/binaries
                  curl -L "https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/release/ffmpeg.zip" -o ffmpeg.zip
                  unzip ffmpeg.zip -d ffmpeg_out
                  cp ffmpeg_out/ffmpeg src-tauri/binaries/ffmpeg-${{ matrix.target }}
                  curl -L "https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/release/ffprobe.zip" -o ffprobe.zip
                  unzip ffprobe.zip -d ffprobe_out
                  cp ffprobe_out/ffprobe src-tauri/binaries/ffprobe-${{ matrix.target }}
                  chmod +x src-tauri/binaries/ffmpeg-${{ matrix.target }}
                  chmod +x src-tauri/binaries/ffprobe-${{ matrix.target }}

            # TODO: aprowe/rife-ncnn-vulkan does not publish a macOS prebuilt
            # (the fork's release CI only covers Windows + Ubuntu). Until we add a
            # build-from-source step here, the macOS bundle ships the upstream
            # nihui binary which lacks `-M manifest.json` batch mode — RIFE
            # interpolation will fail at runtime on macOS.
            - name: Download rife-ncnn-vulkan — macOS
              if: matrix.platform == 'macos-latest'
              run: |
                  mkdir -p src-tauri/binaries
                  curl -L "https://github.com/nihui/rife-ncnn-vulkan/releases/download/20221029/rife-ncnn-vulkan-20221029-macos.zip" -o rife.zip
                  unzip rife.zip -d rife_out
                  RIFE_DIR=$(find rife_out -maxdepth 1 -type d -name "rife-ncnn-vulkan-*" | head -n1)
                  cp "$RIFE_DIR/rife-ncnn-vulkan" src-tauri/binaries/rife-ncnn-vulkan-${{ matrix.target }}
                  chmod +x src-tauri/binaries/rife-ncnn-vulkan-${{ matrix.target }}
                  mkdir -p src-tauri/binaries/rife-v4.6
                  cp "$RIFE_DIR/rife-v4.6/flownet.bin"   src-tauri/binaries/rife-v4.6/
                  cp "$RIFE_DIR/rife-v4.6/flownet.param" src-tauri/binaries/rife-v4.6/

            - uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  # macOS signing + notarization
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
              with:
                  tagName: ${{ github.ref_name }}
                  releaseName: "Lockstep ${{ github.ref_name }}"
                  releaseBody: |
                      See the assets below to download and install Lockstep.
                  releaseDraft: false
                  prerelease: false
                  args: --target ${{ matrix.target }}
