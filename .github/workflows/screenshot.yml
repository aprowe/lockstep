name: Screenshot

# Two trigger paths:
#   workflow_dispatch — Actions UI / `gh workflow run` / Claude `gh` skill.
#   issue_comment    — comment "/screenshot ..." on a PR; works from the
#                      GitHub mobile app, the web UI, or any tool with
#                      issue-comment perms (no `workflow` OAuth scope needed).
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to post the screenshot(s) to'
        required: true
        type: string
      instructions:
        description: 'JSON: a step or array of steps. See scripts/screenshot.ts for the shape.'
        required: true
        type: string
      comment:
        description: 'Optional preface text for the PR comment (markdown)'
        required: false
        type: string
        default: ''
  issue_comment:
    types: [created]

jobs:
  screenshot:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.issue.pull_request != null && startsWith(github.event.comment.body, '/screenshot'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: React to comment (acknowledge)
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            })

      - name: Parse inputs
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            let prNumber, instructions, preface, triggerCommentId
            if (context.eventName === 'workflow_dispatch') {
              prNumber = parseInt(context.payload.inputs.pr_number, 10)
              instructions = context.payload.inputs.instructions
              preface = context.payload.inputs.comment || ''
              triggerCommentId = ''
            } else {
              prNumber = context.payload.issue.number
              triggerCommentId = String(context.payload.comment.id)
              const body = context.payload.comment.body
              const rest = body.replace(/^\/screenshot[^\S\n]*\n?/, '').trim()
              const m = rest.match(/^([\s\S]*?)?\s*```(?:json)?\s*\n([\s\S]+?)\n```\s*([\s\S]*)?$/)
              if (m) {
                instructions = m[2].trim()
                preface = ((m[1] || '') + '\n\n' + (m[3] || '')).trim()
              } else if (rest.startsWith('@')) {
                instructions = rest.split(/\s+/, 1)[0]
                preface = rest.slice(instructions.length).trim()
              } else {
                instructions = rest
                preface = ''
              }
            }
            if (!Number.isFinite(prNumber)) throw new Error(`invalid pr_number: ${prNumber}`)
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            })
            fs.writeFileSync('/tmp/instructions.raw', instructions)
            core.setOutput('pr_number', String(prNumber))
            core.setOutput('head_sha', pr.head.sha)
            core.setOutput('preface', preface)
            core.setOutput('trigger_comment_id', triggerCommentId)

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.parse.outputs.head_sha }}

      - name: Resolve @path references
        run: |
          set -euo pipefail
          if [[ "$(head -c1 /tmp/instructions.raw)" == "@" ]]; then
            ref="$(tr -d '\n\r' < /tmp/instructions.raw | sed 's/^@//')"
            if [[ ! -f "$ref" ]]; then
              echo "::error::JSON file not found in repo: $ref"
              exit 1
            fi
            cp "$ref" /tmp/instructions.json
          else
            cp /tmp/instructions.raw /tmp/instructions.json
          fi
          echo "Instructions resolved (first line):"
          head -n 1 /tmp/instructions.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Capture screenshots
        run: |
          export INSTRUCTIONS="$(cat /tmp/instructions.json)"
          npx tsx scripts/screenshot.ts

      - name: Upload screenshots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-pr-${{ steps.parse.outputs.pr_number }}-${{ github.run_id }}
          path: screenshots-out/
          if-no-files-found: error
          retention-days: 30

      - name: Publish screenshots to dedicated branch
        id: publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.parse.outputs.pr_number }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          BRANCH="screenshots"
          DEST="pr-${PR_NUMBER}/${RUN_ID}"
          TOKEN_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git"

          SCRATCH=/tmp/screenshots-publish
          rm -rf "$SCRATCH"
          mkdir -p "$SCRATCH"

          (
            cd "$SCRATCH"
            git init -q -b "$BRANCH"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name  "github-actions[bot]"

            if git ls-remote --exit-code --heads "$TOKEN_URL" "$BRANCH" >/dev/null 2>&1; then
              git fetch --depth=1 "$TOKEN_URL" "$BRANCH"
              git reset --hard FETCH_HEAD
            fi

            mkdir -p "$DEST"
            cp -r "$GITHUB_WORKSPACE/screenshots-out/." "$DEST/"

            git add .
            git commit -q -m "Screenshots for PR #${PR_NUMBER} (run ${RUN_ID})"
            git push "$TOKEN_URL" "HEAD:$BRANCH"
          )

          {
            echo "branch=$BRANCH"
            echo "dest=$DEST"
          } >> "$GITHUB_OUTPUT"

      - name: Post comment to PR
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.parse.outputs.pr_number }}
          PREFACE: ${{ steps.parse.outputs.preface }}
          BRANCH: ${{ steps.publish.outputs.branch }}
          DEST: ${{ steps.publish.outputs.dest }}
          RUN_ID: ${{ github.run_id }}
          TRIGGER_COMMENT_ID: ${{ steps.parse.outputs.trigger_comment_id }}
        with:
          script: |
            const fs = require('fs')
            const dir = 'screenshots-out'
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.png')).sort()
            const owner = context.repo.owner
            const repo  = context.repo.repo
            const baseUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${process.env.BRANCH}/${process.env.DEST}`
            const runUrl  = `https://github.com/${owner}/${repo}/actions/runs/${process.env.RUN_ID}`

            const lines = []
            const preface = (process.env.PREFACE ?? '').trim()
            if (preface) lines.push(preface, '')
            lines.push(`### Screenshots — [run ${process.env.RUN_ID}](${runUrl})`, '')
            for (const f of files) {
              const label = f.replace(/\.png$/, '')
              lines.push(`**${label}**`, '')
              lines.push(`![${label}](${baseUrl}/${f})`, '')
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: parseInt(process.env.PR_NUMBER, 10),
              body: lines.join('\n'),
            })

            const triggerId = process.env.TRIGGER_COMMENT_ID
            if (triggerId) {
              try {
                await github.rest.reactions.createForIssueComment({
                  owner, repo, comment_id: parseInt(triggerId, 10), content: 'rocket',
                })
              } catch (err) {
                console.warn('failed to add rocket reaction:', err.message)
              }
            }
