name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm test
        name: Vitest

      - run: npx tsx scripts/behavior.ts check
        name: Behavior coverage

      - run: npx tsx scripts/layouts.ts check
        name: Layout coverage
