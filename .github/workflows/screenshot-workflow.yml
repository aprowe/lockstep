name: Screenshot

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to post the screenshot(s) to'
        required: true
        type: string
      instructions:
        description: 'JSON: a step or array of steps. See scripts/screenshot.ts for the shape.'
        required: true
        type: string
      comment:
        description: 'Optional preface text for the PR comment (markdown)'
        required: false
        type: string
        default: ''

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Resolve PR head
        id: pr
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
        with:
          script: |
            const num = parseInt(process.env.PR_NUMBER, 10)
            if (!Number.isFinite(num)) throw new Error(`invalid pr_number: ${process.env.PR_NUMBER}`)
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: num,
            })
            core.setOutput('head_sha', pr.head.sha)
            core.setOutput('head_ref', pr.head.ref)

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Capture screenshots
        env:
          INSTRUCTIONS: ${{ inputs.instructions }}
        run: npx tsx scripts/screenshot.ts

      - name: Upload screenshots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-pr-${{ inputs.pr_number }}-${{ github.run_id }}
          path: screenshots-out/
          if-no-files-found: error
          retention-days: 30

      - name: Publish screenshots to dedicated branch
        id: publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          BRANCH="screenshots"
          DEST="pr-${PR_NUMBER}/${RUN_ID}"
          TOKEN_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git"

          SCRATCH=/tmp/screenshots-publish
          rm -rf "$SCRATCH"
          mkdir -p "$SCRATCH"

          (
            cd "$SCRATCH"
            git init -q -b "$BRANCH"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name  "github-actions[bot]"

            if git ls-remote --exit-code --heads "$TOKEN_URL" "$BRANCH" >/dev/null 2>&1; then
              git fetch --depth=1 "$TOKEN_URL" "$BRANCH"
              git reset --hard FETCH_HEAD
            fi

            mkdir -p "$DEST"
            cp -r "$GITHUB_WORKSPACE/screenshots-out/." "$DEST/"

            git add .
            git commit -q -m "Screenshots for PR #${PR_NUMBER} (run ${RUN_ID})"
            git push "$TOKEN_URL" "HEAD:$BRANCH"
          )

          {
            echo "branch=$BRANCH"
            echo "dest=$DEST"
          } >> "$GITHUB_OUTPUT"

      - name: Post comment to PR
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          PREFACE: ${{ inputs.comment }}
          BRANCH: ${{ steps.publish.outputs.branch }}
          DEST: ${{ steps.publish.outputs.dest }}
          RUN_ID: ${{ github.run_id }}
        with:
          script: |
            const fs = require('fs')
            const path = require('path')
            const dir = 'screenshots-out'
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.png')).sort()
            const owner = context.repo.owner
            const repo  = context.repo.repo
            const baseUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${process.env.BRANCH}/${process.env.DEST}`
            const runUrl  = `https://github.com/${owner}/${repo}/actions/runs/${process.env.RUN_ID}`

            const lines = []
            const preface = (process.env.PREFACE ?? '').trim()
            if (preface) lines.push(preface, '')
            lines.push(`### Screenshots — [run ${process.env.RUN_ID}](${runUrl})`, '')
            for (const f of files) {
              const label = f.replace(/\.png$/, '')
              lines.push(`**${label}**`, '')
              lines.push(`![${label}](${baseUrl}/${f})`, '')
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: parseInt(process.env.PR_NUMBER, 10),
              body: lines.join('\n'),
            })
