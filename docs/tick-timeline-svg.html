<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lockstep — Tick Timeline Sandbox (SVG)</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0B0F14;
  --panel: #11171F;
  --panel-2: #0E141B;
  --line: rgba(255,255,255,0.06);
  --line-strong: rgba(255,255,255,0.12);
  --text: #EAF2FF;
  --text-dim: #9AA7B5;
  --text-faint: #6B7785;
  --accent: #00E5FF;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
  font-size: 13px;
  line-height: 1.5;
  overflow: hidden;
}

body { display: flex; flex-direction: column; min-height: 100vh; }

header.top {
  padding: 18px 24px 14px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: baseline;
  gap: 16px;
}

header.top h1 {
  font-size: 12px;
  letter-spacing: 0.28em;
  color: var(--accent);
  text-transform: uppercase;
}

header.top p {
  color: var(--text-faint);
  font-size: 11px;
  letter-spacing: 0.04em;
}

.mode-switch { margin-left: auto; display: flex; gap: 4px; }

.mode-switch a {
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-faint);
  text-decoration: none;
  padding: 4px 10px;
  border: 1px solid var(--line);
  border-radius: 3px;
  transition: color .15s, border-color .15s;
}

.mode-switch a:hover { color: var(--accent); border-color: var(--accent); }
.mode-switch a.active { color: var(--accent); border-color: var(--accent); background: rgba(0,229,255,0.06); }

.controls {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 16px;
  background: var(--panel-2);
  border-bottom: 1px solid var(--line);
  flex-wrap: wrap;
}

.group {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 10px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 4px;
  height: 30px;
}

.group label {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-faint);
}

.group input[type="number"], .group select {
  background: transparent;
  border: none;
  color: var(--text);
  font-family: inherit;
  font-size: 12px;
  width: 50px;
  outline: none;
  padding: 0;
}

.group select { width: auto; padding-right: 4px; cursor: pointer; }
.group select option { background: var(--panel); }
.group .sep { color: var(--text-faint); font-size: 11px; }

.btn {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 4px;
  color: var(--text);
  font-family: inherit;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  height: 30px;
  padding: 0 14px;
  cursor: pointer;
  transition: border-color .15s, color .15s, background .15s;
}

.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #00131A; font-weight: 600; }
.btn.primary:hover { background: #4DECFF; border-color: #4DECFF; }

.spacer { flex: 1; }

.transport {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 10px 24px;
  background: var(--panel);
  border-bottom: 1px solid var(--line);
}

.bbt-display {
  font-size: 22px;
  letter-spacing: 0.08em;
  color: var(--text);
  font-variant-numeric: tabular-nums;
  min-width: 140px;
}

.time-display {
  font-size: 12px;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.06em;
}

.stage {
  flex: 1;
  position: relative;
  overflow: hidden;
}

#svgTimeline {
  display: block;
  width: 100%;
  height: 100%;
  cursor: text;
  user-select: none;
  touch-action: none;
}

#svgTimeline.scrubbing { cursor: ew-resize; }
#svgTimeline.panning { cursor: grabbing; }

@media (max-width: 720px) {
  header.top { padding: 12px 14px 10px; flex-wrap: wrap; gap: 8px; }
  header.top p { display: none; }
  .controls { padding: 8px 10px; gap: 4px; }
  .transport { padding: 8px 14px; gap: 12px; }
  .bbt-display { font-size: 18px; min-width: 110px; }
  footer.hints { padding: 8px 14px; gap: 12px; }
  footer.hints span { font-size: 10px; }
  .mode-badge { display: none; }
}

/* --- THEME via CSS (SVG's killer feature) --- */

#svgTimeline .ruler-bg { fill: #2A2A2A; }
#svgTimeline .lane-bg { fill: #1A1A1A; }
#svgTimeline .ruler-border { stroke: rgba(0,0,0,0.5); stroke-width: 1; }

#svgTimeline .grid-sub { stroke: rgba(255,255,255,0.02); stroke-width: 1; shape-rendering: crispEdges; }
#svgTimeline .grid-beat { stroke: rgba(255,255,255,0.04); stroke-width: 1; shape-rendering: crispEdges; }
#svgTimeline .grid-bar { stroke: rgba(255,255,255,0.08); stroke-width: 1; shape-rendering: crispEdges; }

#svgTimeline .tick-sub { stroke: #4A4A4A; stroke-width: 1; shape-rendering: crispEdges; }
#svgTimeline .tick-beat { stroke: #888; stroke-width: 1; shape-rendering: crispEdges; }
#svgTimeline .tick-bar { stroke: #FFFFFF; stroke-width: 1; shape-rendering: crispEdges; }

#svgTimeline .label-beat { fill: #9A9A9A; font: 10px 'SF Mono', monospace; }
#svgTimeline .label-bar { fill: #FFFFFF; font: bold 11px 'SF Mono', monospace; }

#svgTimeline .playhead-line { stroke: #FFCC00; stroke-width: 1; shape-rendering: crispEdges; }
#svgTimeline .playhead-glow { stroke: rgba(255,204,0,0.3); stroke-width: 3; shape-rendering: crispEdges; }
#svgTimeline .playhead-flag { fill: #FFCC00; }

/* Ableton is the default above. Bitwig: */
#svgTimeline[data-theme="bitwig"] .ruler-bg { fill: #1E1E1E; }
#svgTimeline[data-theme="bitwig"] .lane-bg { fill: #2C2C2C; }
#svgTimeline[data-theme="bitwig"] .ruler-border { stroke: rgba(0,0,0,0.6); }
#svgTimeline[data-theme="bitwig"] .grid-sub { stroke: rgba(255,255,255,0.015); }
#svgTimeline[data-theme="bitwig"] .grid-beat { stroke: rgba(255,255,255,0.035); }
#svgTimeline[data-theme="bitwig"] .grid-bar { stroke: rgba(255,255,255,0.07); }
#svgTimeline[data-theme="bitwig"] .tick-sub { stroke: #555; }
#svgTimeline[data-theme="bitwig"] .tick-beat { stroke: #8C8C8C; }
#svgTimeline[data-theme="bitwig"] .tick-bar { stroke: #E8E8E8; }
#svgTimeline[data-theme="bitwig"] .label-beat { fill: #8C8C8C; }
#svgTimeline[data-theme="bitwig"] .label-bar { fill: #FF8A1F; }
#svgTimeline[data-theme="bitwig"] .playhead-line { stroke: #FF8A1F; }
#svgTimeline[data-theme="bitwig"] .playhead-glow { stroke: rgba(255,138,31,0.28); }
#svgTimeline[data-theme="bitwig"] .playhead-flag { fill: #FF8A1F; }

/* Logic */
#svgTimeline[data-theme="logic"] .ruler-bg { fill: #3C4046; }
#svgTimeline[data-theme="logic"] .lane-bg { fill: #2D3033; }
#svgTimeline[data-theme="logic"] .ruler-border { stroke: rgba(0,0,0,0.4); }
#svgTimeline[data-theme="logic"] .grid-sub { stroke: rgba(0,0,0,0.05); }
#svgTimeline[data-theme="logic"] .grid-beat { stroke: rgba(0,0,0,0.10); }
#svgTimeline[data-theme="logic"] .grid-bar { stroke: rgba(0,0,0,0.22); }
#svgTimeline[data-theme="logic"] .tick-sub { stroke: #4A4E54; }
#svgTimeline[data-theme="logic"] .tick-beat { stroke: #5A5E64; }
#svgTimeline[data-theme="logic"] .tick-bar { stroke: #0A0A0A; }
#svgTimeline[data-theme="logic"] .label-beat { fill: #5A5E64; }
#svgTimeline[data-theme="logic"] .label-bar { fill: #0A0A0A; }
#svgTimeline[data-theme="logic"] .playhead-line { stroke: #2A7FE0; }
#svgTimeline[data-theme="logic"] .playhead-glow { stroke: rgba(42,127,224,0.3); }
#svgTimeline[data-theme="logic"] .playhead-flag { fill: #2A7FE0; }

/* Lockstep */
#svgTimeline[data-theme="lockstep"] .ruler-bg { fill: #11171F; }
#svgTimeline[data-theme="lockstep"] .lane-bg { fill: #0B0F14; }
#svgTimeline[data-theme="lockstep"] .ruler-border { stroke: rgba(0,0,0,0.5); }
#svgTimeline[data-theme="lockstep"] .grid-sub { stroke: rgba(234,242,255,0.012); }
#svgTimeline[data-theme="lockstep"] .grid-beat { stroke: rgba(234,242,255,0.03); }
#svgTimeline[data-theme="lockstep"] .grid-bar { stroke: rgba(234,242,255,0.06); }
#svgTimeline[data-theme="lockstep"] .tick-sub { stroke: #2F3942; }
#svgTimeline[data-theme="lockstep"] .tick-beat { stroke: #6B7785; }
#svgTimeline[data-theme="lockstep"] .tick-bar { stroke: #EAF2FF; }
#svgTimeline[data-theme="lockstep"] .label-beat { fill: #6B7785; }
#svgTimeline[data-theme="lockstep"] .label-bar { fill: #EAF2FF; }
#svgTimeline[data-theme="lockstep"] .playhead-line { stroke: #00E5FF; }
#svgTimeline[data-theme="lockstep"] .playhead-glow { stroke: rgba(0,229,255,0.32); }
#svgTimeline[data-theme="lockstep"] .playhead-flag { fill: #00E5FF; }

footer.hints {
  padding: 10px 24px;
  border-top: 1px solid var(--line);
  background: var(--panel-2);
  display: flex;
  gap: 22px;
  flex-wrap: wrap;
}

footer.hints span { font-size: 11px; color: var(--text-faint); letter-spacing: 0.04em; }
footer.hints kbd {
  display: inline-block;
  padding: 1px 6px;
  margin-right: 4px;
  border: 1px solid var(--line-strong);
  border-radius: 3px;
  background: var(--panel);
  color: var(--text-dim);
  font-family: inherit;
  font-size: 10px;
}

.mode-badge {
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--text-faint);
  text-transform: uppercase;
  padding: 2px 8px;
  border: 1px solid var(--line-strong);
  border-radius: 3px;
  margin-left: 12px;
}
</style>
</head>
<body>

<header class="top">
  <h1>Tick Timeline</h1>
  <p>DAW-style ruler — Ableton / Bitwig / Logic inspired</p>
  <span class="mode-badge">SVG · DOM</span>
  <div class="mode-switch">
    <a href="./tick-timeline.html">Canvas</a>
    <a href="./tick-timeline-svg.html" class="active">SVG</a>
  </div>
</header>

<div class="controls">
  <div class="group">
    <label>BPM</label>
    <input id="bpm" type="number" min="20" max="300" step="0.5" value="120">
  </div>

  <div class="group">
    <label>Sig</label>
    <input id="tsNum" type="number" min="1" max="32" value="4" style="width:30px">
    <span class="sep">/</span>
    <select id="tsDen">
      <option>2</option><option>4</option><option selected>4</option><option>8</option><option>16</option>
    </select>
  </div>

  <div class="group">
    <label>Snap</label>
    <select id="snap">
      <option value="0">Off</option>
      <option value="4">Bar</option>
      <option value="1" selected>Beat</option>
      <option value="0.5">1/8</option>
      <option value="0.25">1/16</option>
      <option value="0.125">1/32</option>
    </select>
  </div>

  <div class="group">
    <label>Theme</label>
    <select id="theme">
      <option value="ableton" selected>Ableton</option>
      <option value="bitwig">Bitwig</option>
      <option value="logic">Logic</option>
      <option value="lockstep">Lockstep</option>
    </select>
  </div>

  <div class="group">
    <label>Zoom</label>
    <input id="zoom" type="range" min="6" max="400" step="1" value="48" style="width:140px">
  </div>

  <div class="spacer"></div>

  <button class="btn" id="goStart" title="Go to start (Home)">⏮</button>
  <button class="btn primary" id="play" title="Play / Pause (Space)">▶ Play</button>
  <button class="btn" id="stop" title="Stop">■</button>
</div>

<div class="transport">
  <div class="bbt-display" id="bbt">1.1.1</div>
  <div class="time-display" id="time">00:00.000</div>
  <div class="spacer"></div>
  <div class="time-display" id="status">— stopped</div>
</div>

<div class="stage">
  <svg id="svgTimeline" data-theme="ableton" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <rect class="lane-bg" x="0" y="0" width="100%" height="100%"/>
    <rect class="ruler-bg" x="0" y="0" width="100%" height="44"/>
    <g id="gridLines"></g>
    <g id="rulerTicks"></g>
    <g id="rulerLabels"></g>
    <line class="ruler-border" x1="0" y1="43.5" x2="100%" y2="43.5"/>
    <g id="playhead">
      <line class="playhead-glow" x1="0" y1="0" x2="0" y2="100%"/>
      <line class="playhead-line" x1="0" y1="0" x2="0" y2="100%"/>
      <polygon class="playhead-flag" points="0,0 7,0 0,7"/>
    </g>
  </svg>
</div>

<footer class="hints">
  <span><kbd>Space</kbd>play / pause</span>
  <span><kbd>←</kbd><kbd>→</kbd>nudge by beat</span>
  <span><kbd>Home</kbd>to start</span>
  <span><kbd>Click</kbd>seek</span>
  <span><kbd>Drag</kbd>scrub on ruler</span>
  <span><kbd>Wheel</kbd>scroll</span>
  <span><kbd>⌘ / Ctrl</kbd>+wheel: zoom</span>
  <span><kbd>Alt</kbd>+drag: pan</span>
  <span><kbd>Tap</kbd>seek · <kbd>Pinch</kbd>zoom</span>
</footer>

<script>
'use strict';

const RULER_H = 44;
const SVG_NS = 'http://www.w3.org/2000/svg';

const state = {
  bpm: 120,
  tsNum: 4,
  tsDen: 4,
  snap: 1,
  zoom: 48,
  scroll: 0,
  playheadBeats: 0,
  playing: false,
  lastTime: 0,
};

const svg = document.getElementById('svgTimeline');
const gGrid = document.getElementById('gridLines');
const gTicks = document.getElementById('rulerTicks');
const gLabels = document.getElementById('rulerLabels');
const gPlayhead = document.getElementById('playhead');
const playheadGlow = gPlayhead.querySelector('.playhead-glow');
const playheadLine = gPlayhead.querySelector('.playhead-line');
const playheadFlag = gPlayhead.querySelector('.playhead-flag');

let cssW = 0, cssH = 0;

function syncSize() {
  const rect = svg.getBoundingClientRect();
  cssW = rect.width;
  cssH = rect.height;
  // Update full-height SVG elements that need pixel height
  playheadGlow.setAttribute('y2', cssH);
  playheadLine.setAttribute('y2', cssH);
  render();
}

new ResizeObserver(syncSize).observe(svg);

// -------- Render --------
function render() {
  const ppb = state.zoom;
  const beatsPerBar = state.tsNum;
  const scroll = state.scroll;

  // Visible range with overscan
  const firstBeat = Math.floor(scroll / ppb) - 1;
  const lastBeat = Math.ceil((scroll + cssW) / ppb) + 1;

  const ppSixteenth = ppb / 4;
  const ppEighth = ppb / 2;
  const showSixteenths = ppSixteenth >= 5;
  const showEighths = ppEighth >= 6 && !showSixteenths;
  const showBeats = ppb >= 10;
  const labelBeats = ppb >= 56;

  // Build SVG fragments as strings (fastest for SVG bulk-update)
  let gridStr = '';
  let tickStr = '';
  let labelStr = '';

  // Sub-beat grid (lane only) + ticks (ruler)
  if (showSixteenths) {
    for (let i = firstBeat * 4; i <= lastBeat * 4; i++) {
      if (i % 4 === 0) continue;
      const x = Math.round(i * ppSixteenth - scroll) + 0.5;
      gridStr += `<line class="grid-sub" x1="${x}" y1="${RULER_H}" x2="${x}" y2="${cssH}"/>`;
      tickStr += `<line class="tick-sub" x1="${x}" y1="${RULER_H - 5}" x2="${x}" y2="${RULER_H - 1}"/>`;
    }
  } else if (showEighths) {
    for (let i = firstBeat * 2; i <= lastBeat * 2; i++) {
      if (i % 2 === 0) continue;
      const x = Math.round(i * ppEighth - scroll) + 0.5;
      gridStr += `<line class="grid-sub" x1="${x}" y1="${RULER_H}" x2="${x}" y2="${cssH}"/>`;
      tickStr += `<line class="tick-sub" x1="${x}" y1="${RULER_H - 6}" x2="${x}" y2="${RULER_H - 1}"/>`;
    }
  }

  // Beat grid + ticks
  if (showBeats) {
    for (let b = firstBeat; b <= lastBeat; b++) {
      if (b % beatsPerBar === 0) continue;
      const x = Math.round(b * ppb - scroll) + 0.5;
      gridStr += `<line class="grid-beat" x1="${x}" y1="${RULER_H}" x2="${x}" y2="${cssH}"/>`;
      tickStr += `<line class="tick-beat" x1="${x}" y1="${RULER_H - 11}" x2="${x}" y2="${RULER_H - 1}"/>`;
      if (labelBeats) {
        const bar = Math.floor(b / beatsPerBar) + 1;
        const beat = (b % beatsPerBar) + 1;
        labelStr += `<text class="label-beat" x="${x - 0.5 + 3}" y="${16}">${bar}.${beat}</text>`;
      }
    }
  }

  // Bar grid + ticks + labels
  const firstBar = Math.floor(firstBeat / beatsPerBar);
  const lastBar = Math.ceil(lastBeat / beatsPerBar);
  for (let bar = firstBar; bar <= lastBar; bar++) {
    const x = Math.round(bar * beatsPerBar * ppb - scroll) + 0.5;
    gridStr += `<line class="grid-bar" x1="${x}" y1="${RULER_H}" x2="${x}" y2="${cssH}"/>`;
    tickStr += `<line class="tick-bar" x1="${x}" y1="4" x2="${x}" y2="${RULER_H - 1}"/>`;
    labelStr += `<text class="label-bar" x="${x - 0.5 + 4}" y="${15}">${bar + 1}</text>`;
  }

  gGrid.innerHTML = gridStr;
  gTicks.innerHTML = tickStr;
  gLabels.innerHTML = labelStr;

  updatePlayhead();
}

function updatePlayhead() {
  const px = Math.round(state.playheadBeats * state.zoom - state.scroll) + 0.5;
  playheadGlow.setAttribute('x1', px);
  playheadGlow.setAttribute('x2', px);
  playheadLine.setAttribute('x1', px);
  playheadLine.setAttribute('x2', px);
  playheadFlag.setAttribute('points', `${px - 0.5},0 ${px + 7},0 ${px - 0.5},7`);
}

// -------- Helpers --------
function snapBeats(beats) {
  if (!state.snap) return beats;
  return Math.round(beats / state.snap) * state.snap;
}

function beatsToSeconds(beats) { return beats * 60 / state.bpm; }

function formatBBT(beats) {
  const beatsPerBar = state.tsNum;
  const b = Math.max(0, beats);
  const bar = Math.floor(b / beatsPerBar);
  const beatInBar = Math.floor(b - bar * beatsPerBar);
  const frac = b - bar * beatsPerBar - beatInBar;
  const sixteenth = Math.floor(frac * 4);
  return `${bar + 1}.${beatInBar + 1}.${sixteenth + 1}`;
}

function formatTime(beats) {
  const secs = Math.max(0, beatsToSeconds(beats));
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  const ms = Math.floor((secs - Math.floor(secs)) * 1000);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(ms).padStart(3,'0')}`;
}

function updateReadout() {
  document.getElementById('bbt').textContent = formatBBT(state.playheadBeats);
  document.getElementById('time').textContent = formatTime(state.playheadBeats);
}

function setPlayhead(beats, withSnap = false) {
  let b = withSnap ? snapBeats(beats) : beats;
  if (b < 0) b = 0;
  state.playheadBeats = b;
  updateReadout();
  updatePlayhead();
}

function ensurePlayheadVisible() {
  const ppb = state.zoom;
  const px = state.playheadBeats * ppb - state.scroll;
  const margin = 60;
  let changed = false;
  if (px < margin) {
    state.scroll = state.playheadBeats * ppb - margin;
    changed = true;
  } else if (px > cssW - margin) {
    state.scroll = state.playheadBeats * ppb - (cssW - margin);
    changed = true;
  }
  if (state.scroll < 0) state.scroll = 0;
  if (changed) render();
}

// -------- Interaction --------
let dragMode = null;
let dragStartX = 0, dragStartScroll = 0;

function pxToBeats(px) { return (px + state.scroll) / state.zoom; }

svg.addEventListener('mousedown', (e) => {
  const rect = svg.getBoundingClientRect();
  const x = e.clientX - rect.left;

  if (e.altKey || e.button === 1) {
    dragMode = 'pan';
    dragStartX = e.clientX;
    dragStartScroll = state.scroll;
    svg.classList.add('panning');
    e.preventDefault();
    return;
  }

  setPlayhead(pxToBeats(x), true);
  dragMode = 'scrub';
  svg.classList.add('scrubbing');
});

window.addEventListener('mousemove', (e) => {
  if (!dragMode) return;
  const rect = svg.getBoundingClientRect();
  const x = e.clientX - rect.left;

  if (dragMode === 'pan') {
    const dx = e.clientX - dragStartX;
    state.scroll = Math.max(0, dragStartScroll - dx);
    render();
  } else if (dragMode === 'scrub') {
    setPlayhead(pxToBeats(x), true);
  }
});

window.addEventListener('mouseup', () => {
  dragMode = null;
  svg.classList.remove('scrubbing', 'panning');
});

// -------- Touch --------
let touchState = null;

svg.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const rect = svg.getBoundingClientRect();
  if (e.touches.length === 1) {
    const x = e.touches[0].clientX - rect.left;
    setPlayhead(pxToBeats(x), true);
    touchState = { mode: 'scrub' };
  } else if (e.touches.length === 2) {
    const t0 = e.touches[0], t1 = e.touches[1];
    const cx = (t0.clientX + t1.clientX) / 2 - rect.left;
    const dist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
    touchState = {
      mode: 'pinch',
      distance0: dist,
      zoom0: state.zoom,
      beatsAtCenter: pxToBeats(cx),
    };
  }
}, { passive: false });

svg.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!touchState) return;
  const rect = svg.getBoundingClientRect();
  if (touchState.mode === 'scrub' && e.touches.length === 1) {
    const x = e.touches[0].clientX - rect.left;
    setPlayhead(pxToBeats(x), true);
  } else if (touchState.mode === 'pinch' && e.touches.length >= 2) {
    const t0 = e.touches[0], t1 = e.touches[1];
    const cx = (t0.clientX + t1.clientX) / 2 - rect.left;
    const dist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
    const ratio = dist / touchState.distance0;
    state.zoom = Math.max(6, Math.min(800, touchState.zoom0 * ratio));
    state.scroll = Math.max(0, touchState.beatsAtCenter * state.zoom - cx);
    document.getElementById('zoom').value = Math.min(400, Math.round(state.zoom));
    render();
  }
}, { passive: false });

svg.addEventListener('touchend', (e) => {
  if (e.touches.length === 0) touchState = null;
}, { passive: false });

svg.addEventListener('touchcancel', () => { touchState = null; }, { passive: false });

svg.addEventListener('wheel', (e) => {
  e.preventDefault();
  if (e.ctrlKey || e.metaKey) {
    const rect = svg.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const beatsAtCursor = pxToBeats(x);
    const factor = Math.exp(-e.deltaY * 0.002);
    state.zoom = Math.max(6, Math.min(800, state.zoom * factor));
    state.scroll = Math.max(0, beatsAtCursor * state.zoom - x);
    document.getElementById('zoom').value = Math.min(400, Math.round(state.zoom));
    render();
  } else {
    const dx = e.deltaX !== 0 ? e.deltaX : e.deltaY;
    state.scroll = Math.max(0, state.scroll + dx);
    render();
  }
}, { passive: false });

// -------- Transport --------
function play() {
  if (state.playing) return;
  state.playing = true;
  state.lastTime = performance.now();
  document.getElementById('play').textContent = '⏸ Pause';
  document.getElementById('status').textContent = '● playing';
  requestAnimationFrame(tick);
}

function pause() {
  state.playing = false;
  document.getElementById('play').textContent = '▶ Play';
  document.getElementById('status').textContent = '— paused';
}

function stop() {
  pause();
  state.playheadBeats = 0;
  state.scroll = 0;
  document.getElementById('status').textContent = '— stopped';
  updateReadout();
  render();
}

function tick(now) {
  if (!state.playing) return;
  const dt = (now - state.lastTime) / 1000;
  state.lastTime = now;
  state.playheadBeats += dt * state.bpm / 60;
  updateReadout();
  updatePlayhead();
  ensurePlayheadVisible();
  requestAnimationFrame(tick);
}

document.getElementById('play').addEventListener('click', () => state.playing ? pause() : play());
document.getElementById('stop').addEventListener('click', stop);
document.getElementById('goStart').addEventListener('click', () => {
  state.playheadBeats = 0;
  state.scroll = 0;
  updateReadout();
  render();
});

// -------- Keyboard --------
window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Space') {
    e.preventDefault();
    state.playing ? pause() : play();
  } else if (e.code === 'Home') {
    e.preventDefault();
    state.playheadBeats = 0;
    state.scroll = 0;
    updateReadout();
    render();
  } else if (e.code === 'ArrowLeft') {
    e.preventDefault();
    setPlayhead(state.playheadBeats - (e.shiftKey ? state.tsNum : 1));
  } else if (e.code === 'ArrowRight') {
    e.preventDefault();
    setPlayhead(state.playheadBeats + (e.shiftKey ? state.tsNum : 1));
  }
});

// -------- Controls binding --------
document.getElementById('bpm').addEventListener('input', (e) => {
  const v = parseFloat(e.target.value);
  if (!isNaN(v) && v > 0) { state.bpm = v; updateReadout(); }
});
document.getElementById('tsNum').addEventListener('input', (e) => {
  const v = parseInt(e.target.value, 10);
  if (!isNaN(v) && v > 0) { state.tsNum = v; updateReadout(); render(); }
});
document.getElementById('tsDen').addEventListener('change', (e) => {
  state.tsDen = parseInt(e.target.value, 10);
  render();
});
document.getElementById('snap').addEventListener('change', (e) => {
  state.snap = parseFloat(e.target.value);
});
document.getElementById('theme').addEventListener('change', (e) => {
  svg.dataset.theme = e.target.value;
});
document.getElementById('zoom').addEventListener('input', (e) => {
  const newZoom = parseFloat(e.target.value);
  const centerBeats = pxToBeats(cssW / 2);
  state.zoom = newZoom;
  state.scroll = Math.max(0, centerBeats * state.zoom - cssW / 2);
  render();
});

// -------- Init --------
syncSize();
updateReadout();
</script>
</body>
</html>
