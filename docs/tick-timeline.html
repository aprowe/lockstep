<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lockstep — Tick Timeline Sandbox</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0B0F14;
  --panel: #11171F;
  --panel-2: #0E141B;
  --line: rgba(255,255,255,0.06);
  --line-strong: rgba(255,255,255,0.12);
  --text: #EAF2FF;
  --text-dim: #9AA7B5;
  --text-faint: #6B7785;
  --accent: #00E5FF;
  --accent-warm: #FFB454;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
  font-size: 13px;
  line-height: 1.5;
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

header.top {
  padding: 18px 24px 14px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: baseline;
  gap: 16px;
}

header.top h1 {
  font-size: 12px;
  letter-spacing: 0.28em;
  color: var(--accent);
  text-transform: uppercase;
}

header.top p {
  color: var(--text-faint);
  font-size: 11px;
  letter-spacing: 0.04em;
}

.mode-switch { margin-left: auto; display: flex; gap: 4px; }

.mode-switch a {
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-faint);
  text-decoration: none;
  padding: 4px 10px;
  border: 1px solid var(--line);
  border-radius: 3px;
  transition: color .15s, border-color .15s;
}

.mode-switch a:hover { color: var(--accent); border-color: var(--accent); }
.mode-switch a.active { color: var(--accent); border-color: var(--accent); background: rgba(0,229,255,0.06); }

.mode-badge {
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--text-faint);
  text-transform: uppercase;
  padding: 2px 8px;
  border: 1px solid var(--line-strong);
  border-radius: 3px;
  margin-left: 12px;
}

.controls {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 16px;
  background: var(--panel-2);
  border-bottom: 1px solid var(--line);
  flex-wrap: wrap;
}

.group {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 10px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 4px;
  height: 30px;
}

.group + .group { margin-left: 2px; }

.group label {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-faint);
}

.group input[type="number"],
.group select {
  background: transparent;
  border: none;
  color: var(--text);
  font-family: inherit;
  font-size: 12px;
  width: 50px;
  outline: none;
  padding: 0;
}

.group select { width: auto; padding-right: 4px; cursor: pointer; }
.group select option { background: var(--panel); }

.group .sep {
  color: var(--text-faint);
  font-size: 11px;
}

.btn {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 4px;
  color: var(--text);
  font-family: inherit;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  height: 30px;
  padding: 0 14px;
  cursor: pointer;
  transition: border-color .15s, color .15s, background .15s;
}

.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn:active { background: rgba(0,229,255,0.08); }

.btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #00131A;
  font-weight: 600;
}

.btn.primary:hover { background: #4DECFF; border-color: #4DECFF; }

.spacer { flex: 1; }

.transport {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 10px 24px;
  background: var(--panel);
  border-bottom: 1px solid var(--line);
}

.bbt-display {
  font-family: inherit;
  font-size: 22px;
  letter-spacing: 0.08em;
  color: var(--text);
  font-variant-numeric: tabular-nums;
  min-width: 140px;
}

.time-display {
  font-size: 12px;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.06em;
}

.stage {
  flex: 1;
  position: relative;
  background: var(--panel-2);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

#tickCanvas {
  display: block;
  width: 100%;
  height: 100%;
  cursor: text;
  touch-action: none;
  user-select: none;
}

#tickCanvas.scrubbing { cursor: ew-resize; }
#tickCanvas.panning { cursor: grabbing; }

@media (max-width: 720px) {
  header.top { padding: 12px 14px 10px; flex-wrap: wrap; gap: 8px; }
  header.top p { display: none; }
  .controls { padding: 8px 10px; gap: 4px; }
  .transport { padding: 8px 14px; gap: 12px; }
  .bbt-display { font-size: 18px; min-width: 110px; }
  footer.hints { padding: 8px 14px; gap: 12px; }
  footer.hints span { font-size: 10px; }
  .mode-badge { display: none; }
}

footer.hints {
  padding: 10px 24px;
  border-top: 1px solid var(--line);
  background: var(--panel-2);
  display: flex;
  gap: 22px;
  flex-wrap: wrap;
}

footer.hints span {
  font-size: 11px;
  color: var(--text-faint);
  letter-spacing: 0.04em;
}

footer.hints kbd {
  display: inline-block;
  padding: 1px 6px;
  margin-right: 4px;
  border: 1px solid var(--line-strong);
  border-radius: 3px;
  background: var(--panel);
  color: var(--text-dim);
  font-family: inherit;
  font-size: 10px;
}
</style>
</head>
<body>

<header class="top">
  <h1>Tick Timeline</h1>
  <p>DAW-style ruler — Ableton / Bitwig / Logic inspired</p>
  <span class="mode-badge">Canvas · 2D</span>
  <div class="mode-switch">
    <a href="./tick-timeline.html" class="active">Canvas</a>
    <a href="./tick-timeline-svg.html">SVG</a>
  </div>
</header>

<div class="controls">
  <div class="group">
    <label>BPM</label>
    <input id="bpm" type="number" min="20" max="300" step="0.5" value="120">
  </div>

  <div class="group">
    <label>Sig</label>
    <input id="tsNum" type="number" min="1" max="32" value="4" style="width:30px">
    <span class="sep">/</span>
    <select id="tsDen">
      <option>2</option><option>4</option><option selected>4</option><option>8</option><option>16</option>
    </select>
  </div>

  <div class="group">
    <label>Snap</label>
    <select id="snap">
      <option value="0">Off</option>
      <option value="4">Bar</option>
      <option value="1" selected>Beat</option>
      <option value="0.5">1/8</option>
      <option value="0.25">1/16</option>
      <option value="0.125">1/32</option>
    </select>
  </div>

  <div class="group">
    <label>Theme</label>
    <select id="theme">
      <option value="ableton" selected>Ableton</option>
      <option value="bitwig">Bitwig</option>
      <option value="logic">Logic</option>
      <option value="lockstep">Lockstep</option>
    </select>
  </div>

  <div class="group">
    <label>Zoom</label>
    <input id="zoom" type="range" min="0" max="1000" step="1" value="750" style="width:140px">
  </div>

  <div class="spacer"></div>

  <button class="btn" id="goStart" title="Go to start (Home)">⏮</button>
  <button class="btn primary" id="play" title="Play / Pause (Space)">▶ Play</button>
  <button class="btn" id="stop" title="Stop">■</button>
</div>

<div class="transport">
  <div class="bbt-display" id="bbt">1.1.1</div>
  <div class="time-display" id="time">00:00.000</div>
  <div class="spacer"></div>
  <div class="time-display" id="status">— stopped</div>
</div>

<div class="stage">
  <canvas id="tickCanvas"></canvas>
</div>

<footer class="hints">
  <span><kbd>Space</kbd>play / pause</span>
  <span><kbd>←</kbd><kbd>→</kbd>nudge by beat</span>
  <span><kbd>Home</kbd>to start</span>
  <span><kbd>Click</kbd>seek</span>
  <span><kbd>Drag</kbd>scrub on ruler</span>
  <span><kbd>Wheel</kbd>scroll</span>
  <span><kbd>⌘ / Ctrl</kbd>+wheel: zoom</span>
  <span><kbd>Alt</kbd>+drag: pan</span>
  <span><kbd>Tap</kbd>seek · <kbd>Pinch</kbd>zoom</span>
</footer>

<script>
'use strict';

// -------- Themes (DAW-inspired) --------
const THEMES = {
  ableton: {
    bg: '#1A1A1A',
    rulerBg: '#2A2A2A',
    laneBg: '#1A1A1A',
    barTick: '#FFFFFF',
    beatTick: '#888888',
    subTick: '#4A4A4A',
    gridBar: 'rgba(255,255,255,0.08)',
    gridBeat: 'rgba(255,255,255,0.04)',
    gridSub: 'rgba(255,255,255,0.02)',
    labelMajor: '#FFFFFF',
    labelMinor: '#9A9A9A',
    playhead: '#FFCC00',
    playheadGlow: 'rgba(255,204,0,0.3)',
    rulerBorder: 'rgba(0,0,0,0.5)',
  },
  bitwig: {
    bg: '#262626',
    rulerBg: '#1E1E1E',
    laneBg: '#2C2C2C',
    barTick: '#E8E8E8',
    beatTick: '#8C8C8C',
    subTick: '#555555',
    gridBar: 'rgba(255,255,255,0.07)',
    gridBeat: 'rgba(255,255,255,0.035)',
    gridSub: 'rgba(255,255,255,0.015)',
    labelMajor: '#FF8A1F',
    labelMinor: '#8C8C8C',
    playhead: '#FF8A1F',
    playheadGlow: 'rgba(255,138,31,0.28)',
    rulerBorder: 'rgba(0,0,0,0.6)',
  },
  logic: {
    bg: '#2D3033',
    rulerBg: '#3C4046',
    laneBg: '#2D3033',
    barTick: '#0A0A0A',
    beatTick: '#5A5E64',
    subTick: '#4A4E54',
    gridBar: 'rgba(0,0,0,0.22)',
    gridBeat: 'rgba(0,0,0,0.10)',
    gridSub: 'rgba(0,0,0,0.05)',
    labelMajor: '#0A0A0A',
    labelMinor: '#5A5E64',
    playhead: '#2A7FE0',
    playheadGlow: 'rgba(42,127,224,0.3)',
    rulerBorder: 'rgba(0,0,0,0.4)',
  },
  lockstep: {
    bg: '#0B0F14',
    rulerBg: '#11171F',
    laneBg: '#0B0F14',
    barTick: '#EAF2FF',
    beatTick: '#6B7785',
    subTick: '#2F3942',
    gridBar: 'rgba(234,242,255,0.06)',
    gridBeat: 'rgba(234,242,255,0.03)',
    gridSub: 'rgba(234,242,255,0.012)',
    labelMajor: '#EAF2FF',
    labelMinor: '#6B7785',
    playhead: '#00E5FF',
    playheadGlow: 'rgba(0,229,255,0.32)',
    rulerBorder: 'rgba(0,0,0,0.5)',
  },
};

// -------- State --------
const state = {
  bpm: 120,
  tsNum: 4,
  tsDen: 4,
  snap: 1,                // in beats; 0 = off
  zoom: 48,               // pixels per beat
  scroll: 0,              // pixels offset from beat 0
  playheadBeats: 0,
  playing: false,
  lastTime: 0,
  theme: 'ableton',
};

const RULER_H = 44;

// Zoom range: 0.025 ppb (~120 min visible at 360px) to 600 ppb (very zoomed in).
// Slider is 0..1000 mapped logarithmically so each step feels equal.
const ZMIN = 0.025;
const ZMAX = 600;
const ZRANGE = Math.log(ZMAX / ZMIN);
const sliderToZoom = (s) => ZMIN * Math.exp((s / 1000) * ZRANGE);
const zoomToSlider = (z) => Math.round(Math.log(z / ZMIN) / ZRANGE * 1000);

// -------- Canvas setup --------
const canvas = document.getElementById('tickCanvas');
const ctx = canvas.getContext('2d');
let cssW = 0, cssH = 0;

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  cssW = rect.width;
  cssH = rect.height;
  canvas.width = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}

new ResizeObserver(resizeCanvas).observe(canvas);

// -------- Drawing --------
function draw() {
  const t = THEMES[state.theme];
  const w = cssW, h = cssH;
  const ppb = state.zoom;           // pixels per beat
  const beatsPerBar = state.tsNum;
  const scroll = state.scroll;

  // Background — lane area
  ctx.fillStyle = t.laneBg;
  ctx.fillRect(0, RULER_H, w, h - RULER_H);

  // Background — ruler
  ctx.fillStyle = t.rulerBg;
  ctx.fillRect(0, 0, w, RULER_H);

  // Adaptive density: pick a power-of-2 bar grouping so major ticks
  // land at least TARGET_MAJOR_PX apart. At low zoom this might be 256 bars;
  // at high zoom it stays 1.
  const ppbar = ppb * beatsPerBar;
  const TARGET_MAJOR_PX = 60;
  let barGroup = 1;
  while (ppbar * barGroup < TARGET_MAJOR_PX) barGroup *= 2;
  if (barGroup > 4096) barGroup = 4096;

  // Sub-bar tier: medium ticks at every Nth bar within a major group.
  // 0 = no sub-tier; 1 = every bar; barGroup/8 when zoomed way out.
  let subBarGroup = 0;
  if (barGroup >= 8) subBarGroup = barGroup / 8;
  else if (barGroup >= 2) subBarGroup = 1;

  // Beat / sub-beat tiers only render when the major is 1 bar AND
  // beats are wide enough to be readable.
  const showBeats = barGroup === 1 && ppb >= 22;
  const labelBeats = barGroup === 1 && ppb >= 70;
  const showSixteenths = barGroup === 1 && ppb / 4 >= 6;
  const showEighths = barGroup === 1 && !showSixteenths && ppb / 2 >= 9;

  const firstBar = Math.floor(scroll / ppbar) - 1;
  const lastBar = Math.ceil((scroll + w) / ppbar) + 1;

  // -- Sub-beat (16th / 8th) grid + ticks --
  if (showSixteenths || showEighths) {
    const div = showSixteenths ? 4 : 2;
    const ppSub = ppb / div;
    const firstBeat = Math.floor(scroll / ppb) - 1;
    const lastBeat = Math.ceil((scroll + w) / ppb) + 1;
    ctx.strokeStyle = t.gridSub;
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = firstBeat * div; i <= lastBeat * div; i++) {
      if (i % div === 0) continue;
      const x = Math.round(i * ppSub - scroll) + 0.5;
      ctx.moveTo(x, RULER_H);
      ctx.lineTo(x, h);
    }
    ctx.stroke();
    ctx.strokeStyle = t.subTick;
    ctx.beginPath();
    for (let i = firstBeat * div; i <= lastBeat * div; i++) {
      if (i % div === 0) continue;
      const x = Math.round(i * ppSub - scroll) + 0.5;
      ctx.moveTo(x, RULER_H - 5);
      ctx.lineTo(x, RULER_H - 1);
    }
    ctx.stroke();
  }

  // -- Beat tier (only when not grouped) --
  if (showBeats) {
    const firstBeat = Math.floor(scroll / ppb) - 1;
    const lastBeat = Math.ceil((scroll + w) / ppb) + 1;
    ctx.strokeStyle = t.gridBeat;
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let b = firstBeat; b <= lastBeat; b++) {
      if (b % beatsPerBar === 0) continue;
      const x = Math.round(b * ppb - scroll) + 0.5;
      ctx.moveTo(x, RULER_H);
      ctx.lineTo(x, h);
    }
    ctx.stroke();
    ctx.strokeStyle = t.beatTick;
    ctx.beginPath();
    for (let b = firstBeat; b <= lastBeat; b++) {
      if (b % beatsPerBar === 0) continue;
      const x = Math.round(b * ppb - scroll) + 0.5;
      ctx.moveTo(x, RULER_H - 11);
      ctx.lineTo(x, RULER_H - 1);
    }
    ctx.stroke();
    if (labelBeats) {
      ctx.fillStyle = t.labelMinor;
      ctx.font = '10px ' + getComputedStyle(document.body).fontFamily;
      ctx.textBaseline = 'top';
      ctx.textAlign = 'left';
      for (let b = firstBeat; b <= lastBeat; b++) {
        if (b % beatsPerBar === 0) continue;
        const x = Math.round(b * ppb - scroll);
        const bar = Math.floor(b / beatsPerBar) + 1;
        const beat = (b % beatsPerBar) + 1;
        ctx.fillText(`${bar}.${beat}`, x + 3, 6);
      }
    }
  }

  // -- Sub-bar tier (medium ticks, no labels) --
  if (subBarGroup > 0) {
    const firstSub = Math.floor(firstBar / subBarGroup) * subBarGroup;
    const lastSub = Math.ceil(lastBar / subBarGroup) * subBarGroup;
    ctx.strokeStyle = t.gridBeat;
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let bar = firstSub; bar <= lastSub; bar += subBarGroup) {
      if (bar % barGroup === 0) continue;
      const x = Math.round(bar * ppbar - scroll) + 0.5;
      ctx.moveTo(x, RULER_H);
      ctx.lineTo(x, h);
    }
    ctx.stroke();
    ctx.strokeStyle = t.beatTick;
    ctx.beginPath();
    for (let bar = firstSub; bar <= lastSub; bar += subBarGroup) {
      if (bar % barGroup === 0) continue;
      const x = Math.round(bar * ppbar - scroll) + 0.5;
      ctx.moveTo(x, RULER_H - 14);
      ctx.lineTo(x, RULER_H - 1);
    }
    ctx.stroke();
  }

  // -- Major bar tier (tall ticks + labels every barGroup bars) --
  const firstMajor = Math.floor(firstBar / barGroup) * barGroup;
  const lastMajor = Math.ceil(lastBar / barGroup) * barGroup;
  ctx.strokeStyle = t.gridBar;
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let bar = firstMajor; bar <= lastMajor; bar += barGroup) {
    const x = Math.round(bar * ppbar - scroll) + 0.5;
    ctx.moveTo(x, RULER_H);
    ctx.lineTo(x, h);
  }
  ctx.stroke();
  ctx.strokeStyle = t.barTick;
  ctx.beginPath();
  for (let bar = firstMajor; bar <= lastMajor; bar += barGroup) {
    const x = Math.round(bar * ppbar - scroll) + 0.5;
    ctx.moveTo(x, 4);
    ctx.lineTo(x, RULER_H - 1);
  }
  ctx.stroke();
  ctx.fillStyle = t.labelMajor;
  ctx.font = 'bold 11px ' + getComputedStyle(document.body).fontFamily;
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';
  for (let bar = firstMajor; bar <= lastMajor; bar += barGroup) {
    const x = Math.round(bar * ppbar - scroll);
    ctx.fillText(String(bar + 1), x + 4, 5);
  }

  // Ruler bottom border
  ctx.strokeStyle = t.rulerBorder;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, RULER_H - 0.5);
  ctx.lineTo(w, RULER_H - 0.5);
  ctx.stroke();

  // -- Playhead --
  const px = Math.round(state.playheadBeats * ppb - scroll) + 0.5;
  if (px >= -2 && px <= w + 2) {
    // Glow
    ctx.strokeStyle = t.playheadGlow;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(px, 0);
    ctx.lineTo(px, h);
    ctx.stroke();

    // Line
    ctx.strokeStyle = t.playhead;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(px, 0);
    ctx.lineTo(px, h);
    ctx.stroke();

    // Flag at top
    ctx.fillStyle = t.playhead;
    ctx.beginPath();
    ctx.moveTo(px - 0.5, 0);
    ctx.lineTo(px + 7, 0);
    ctx.lineTo(px - 0.5, 7);
    ctx.closePath();
    ctx.fill();
  }
}

// -------- Helpers --------
function snapBeats(beats) {
  if (!state.snap) return beats;
  return Math.round(beats / state.snap) * state.snap;
}

function beatsToSeconds(beats) {
  return beats * 60 / state.bpm;
}

function formatBBT(beats) {
  const beatsPerBar = state.tsNum;
  // Clamp to >= 0 for display
  const b = Math.max(0, beats);
  const bar = Math.floor(b / beatsPerBar);
  const beatInBar = Math.floor(b - bar * beatsPerBar);
  const frac = b - bar * beatsPerBar - beatInBar;
  const sixteenth = Math.floor(frac * 4);
  return `${bar + 1}.${beatInBar + 1}.${sixteenth + 1}`;
}

function formatTime(beats) {
  const secs = Math.max(0, beatsToSeconds(beats));
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  const ms = Math.floor((secs - Math.floor(secs)) * 1000);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(ms).padStart(3,'0')}`;
}

function updateReadout() {
  document.getElementById('bbt').textContent = formatBBT(state.playheadBeats);
  document.getElementById('time').textContent = formatTime(state.playheadBeats);
}

function setPlayhead(beats, withSnap = false) {
  let b = withSnap ? snapBeats(beats) : beats;
  if (b < 0) b = 0;
  state.playheadBeats = b;
  updateReadout();
  draw();
}

function ensurePlayheadVisible() {
  const ppb = state.zoom;
  const px = state.playheadBeats * ppb - state.scroll;
  const margin = 60;
  if (px < margin) {
    state.scroll = state.playheadBeats * ppb - margin;
  } else if (px > cssW - margin) {
    state.scroll = state.playheadBeats * ppb - (cssW - margin);
  }
  if (state.scroll < 0) state.scroll = 0;
}

// -------- Interaction --------
let dragMode = null; // 'scrub' | 'pan' | null
let dragStartX = 0, dragStartScroll = 0;

function pxToBeats(px) {
  return (px + state.scroll) / state.zoom;
}

canvas.addEventListener('mousedown', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  if (e.altKey || e.button === 1) {
    dragMode = 'pan';
    dragStartX = e.clientX;
    dragStartScroll = state.scroll;
    canvas.classList.add('panning');
    e.preventDefault();
    return;
  }

  // Click on ruler or lane both seek; ruler also enables scrub-drag
  const beats = pxToBeats(x);
  setPlayhead(beats, true);
  if (y < RULER_H) {
    dragMode = 'scrub';
    canvas.classList.add('scrubbing');
  } else {
    dragMode = 'scrub';
    canvas.classList.add('scrubbing');
  }
});

window.addEventListener('mousemove', (e) => {
  if (!dragMode) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;

  if (dragMode === 'pan') {
    const dx = e.clientX - dragStartX;
    state.scroll = Math.max(0, dragStartScroll - dx);
    draw();
  } else if (dragMode === 'scrub') {
    setPlayhead(pxToBeats(x), true);
  }
});

window.addEventListener('mouseup', () => {
  dragMode = null;
  canvas.classList.remove('scrubbing', 'panning');
});

// -------- Touch --------
let touchState = null;

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  if (e.touches.length === 1) {
    const x = e.touches[0].clientX - rect.left;
    setPlayhead(pxToBeats(x), true);
    touchState = { mode: 'scrub' };
  } else if (e.touches.length === 2) {
    const t0 = e.touches[0], t1 = e.touches[1];
    const cx = (t0.clientX + t1.clientX) / 2 - rect.left;
    const dist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
    touchState = {
      mode: 'pinch',
      distance0: dist,
      zoom0: state.zoom,
      beatsAtCenter: pxToBeats(cx),
    };
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!touchState) return;
  const rect = canvas.getBoundingClientRect();
  if (touchState.mode === 'scrub' && e.touches.length === 1) {
    const x = e.touches[0].clientX - rect.left;
    setPlayhead(pxToBeats(x), true);
  } else if (touchState.mode === 'pinch' && e.touches.length >= 2) {
    const t0 = e.touches[0], t1 = e.touches[1];
    const cx = (t0.clientX + t1.clientX) / 2 - rect.left;
    const dist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
    const ratio = dist / touchState.distance0;
    state.zoom = Math.max(ZMIN, Math.min(ZMAX, touchState.zoom0 * ratio));
    state.scroll = Math.max(0, touchState.beatsAtCenter * state.zoom - cx);
    document.getElementById('zoom').value = zoomToSlider(state.zoom);
    draw();
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  if (e.touches.length === 0) touchState = null;
}, { passive: false });

canvas.addEventListener('touchcancel', () => { touchState = null; }, { passive: false });

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  if (e.ctrlKey || e.metaKey) {
    // Zoom centered on cursor
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const beatsAtCursor = pxToBeats(x);
    const factor = Math.exp(-e.deltaY * 0.002);
    state.zoom = Math.max(ZMIN, Math.min(ZMAX, state.zoom * factor));
    state.scroll = Math.max(0, beatsAtCursor * state.zoom - x);
    document.getElementById('zoom').value = zoomToSlider(state.zoom);
    draw();
  } else {
    // Horizontal scroll — prefer deltaX if present, else fall through to deltaY
    const dx = e.deltaX !== 0 ? e.deltaX : e.deltaY;
    state.scroll = Math.max(0, state.scroll + dx);
    draw();
  }
}, { passive: false });

// -------- Transport --------
function play() {
  if (state.playing) return;
  state.playing = true;
  state.lastTime = performance.now();
  document.getElementById('play').textContent = '⏸ Pause';
  document.getElementById('status').textContent = '● playing';
  requestAnimationFrame(tick);
}

function pause() {
  state.playing = false;
  document.getElementById('play').textContent = '▶ Play';
  document.getElementById('status').textContent = '— paused';
}

function stop() {
  pause();
  state.playheadBeats = 0;
  state.scroll = 0;
  document.getElementById('status').textContent = '— stopped';
  updateReadout();
  draw();
}

function tick(now) {
  if (!state.playing) return;
  const dt = (now - state.lastTime) / 1000;
  state.lastTime = now;
  state.playheadBeats += dt * state.bpm / 60;
  ensurePlayheadVisible();
  updateReadout();
  draw();
  requestAnimationFrame(tick);
}

document.getElementById('play').addEventListener('click', () => {
  state.playing ? pause() : play();
});
document.getElementById('stop').addEventListener('click', stop);
document.getElementById('goStart').addEventListener('click', () => {
  state.playheadBeats = 0;
  state.scroll = 0;
  updateReadout();
  draw();
});

// -------- Keyboard --------
window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Space') {
    e.preventDefault();
    state.playing ? pause() : play();
  } else if (e.code === 'Home') {
    e.preventDefault();
    state.playheadBeats = 0;
    state.scroll = 0;
    updateReadout();
    draw();
  } else if (e.code === 'ArrowLeft') {
    e.preventDefault();
    setPlayhead(state.playheadBeats - (e.shiftKey ? state.tsNum : 1));
  } else if (e.code === 'ArrowRight') {
    e.preventDefault();
    setPlayhead(state.playheadBeats + (e.shiftKey ? state.tsNum : 1));
  }
});

// -------- Controls binding --------
document.getElementById('bpm').addEventListener('input', (e) => {
  const v = parseFloat(e.target.value);
  if (!isNaN(v) && v > 0) { state.bpm = v; updateReadout(); }
});
document.getElementById('tsNum').addEventListener('input', (e) => {
  const v = parseInt(e.target.value, 10);
  if (!isNaN(v) && v > 0) { state.tsNum = v; updateReadout(); draw(); }
});
document.getElementById('tsDen').addEventListener('change', (e) => {
  state.tsDen = parseInt(e.target.value, 10);
  draw();
});
document.getElementById('snap').addEventListener('change', (e) => {
  state.snap = parseFloat(e.target.value);
});
document.getElementById('theme').addEventListener('change', (e) => {
  state.theme = e.target.value;
  draw();
});
document.getElementById('zoom').addEventListener('input', (e) => {
  const centerBeats = pxToBeats(cssW / 2);
  state.zoom = sliderToZoom(parseFloat(e.target.value));
  state.scroll = Math.max(0, centerBeats * state.zoom - cssW / 2);
  draw();
});

// -------- Init --------
resizeCanvas();
updateReadout();
</script>
</body>
</html>
