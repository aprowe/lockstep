<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lockstep — Tick Timeline Sandbox</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0B0F14;
  --panel: #11171F;
  --panel-2: #0E141B;
  --line: rgba(255,255,255,0.06);
  --line-strong: rgba(255,255,255,0.12);
  --text: #EAF2FF;
  --text-dim: #9AA7B5;
  --text-faint: #6B7785;
  --accent: #00E5FF;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
  font-size: 13px;
  line-height: 1.5;
  overflow: hidden;
}
body { display: flex; flex-direction: column; min-height: 100vh; }

header.top {
  padding: 18px 24px 14px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: baseline;
  gap: 16px;
}
header.top h1 {
  font-size: 12px;
  letter-spacing: 0.28em;
  color: var(--accent);
  text-transform: uppercase;
}
header.top p { color: var(--text-faint); font-size: 11px; letter-spacing: 0.04em; }

.mode-badge {
  margin-left: auto;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--text-faint);
  text-transform: uppercase;
  padding: 2px 8px;
  border: 1px solid var(--line-strong);
  border-radius: 3px;
}

.controls {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 16px;
  background: var(--panel-2);
  border-bottom: 1px solid var(--line);
  flex-wrap: wrap;
}

.group {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 10px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 4px;
  height: 30px;
}
.group label {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-faint);
}
.group input[type="number"], .group select {
  background: transparent;
  border: none;
  color: var(--text);
  font-family: inherit;
  font-size: 12px;
  outline: none;
  padding: 0;
}
.group input[type="number"] { width: 50px; }
.group select { padding-right: 4px; cursor: pointer; }
.group select option { background: var(--panel); }
.group .sep { color: var(--text-faint); font-size: 11px; }

[data-mode-bars] { display: none; }
[data-mode-time] { display: none; }
body[data-mode="bars"] [data-mode-bars] { display: flex; }
body[data-mode="time"] [data-mode-time] { display: flex; }

.btn {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 4px;
  color: var(--text);
  font-family: inherit;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  height: 30px;
  padding: 0 14px;
  cursor: pointer;
  transition: border-color .15s, color .15s, background .15s;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #00131A; font-weight: 600; }
.btn.primary:hover { background: #4DECFF; border-color: #4DECFF; }

.spacer { flex: 1; }

.transport {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 10px 24px;
  background: var(--panel);
  border-bottom: 1px solid var(--line);
}
.readout-big {
  font-size: 22px;
  letter-spacing: 0.08em;
  color: var(--text);
  font-variant-numeric: tabular-nums;
  min-width: 180px;
}
.readout-small {
  font-size: 12px;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.06em;
}

.stage {
  flex: 1;
  position: relative;
  background: var(--panel-2);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

#tickCanvas {
  display: block;
  width: 100%;
  height: 100%;
  cursor: text;
  touch-action: none;
  user-select: none;
}
#tickCanvas.scrubbing { cursor: ew-resize; }
#tickCanvas.panning { cursor: grabbing; }

footer.hints {
  padding: 10px 24px;
  border-top: 1px solid var(--line);
  background: var(--panel-2);
  display: flex;
  gap: 22px;
  flex-wrap: wrap;
}
footer.hints span { font-size: 11px; color: var(--text-faint); letter-spacing: 0.04em; }
footer.hints kbd {
  display: inline-block;
  padding: 1px 6px;
  margin-right: 4px;
  border: 1px solid var(--line-strong);
  border-radius: 3px;
  background: var(--panel);
  color: var(--text-dim);
  font-family: inherit;
  font-size: 10px;
}

@media (max-width: 720px) {
  header.top { padding: 12px 14px 10px; flex-wrap: wrap; gap: 8px; }
  header.top p { display: none; }
  .controls { padding: 8px 10px; gap: 4px; }
  .transport { padding: 8px 14px; gap: 12px; }
  .readout-big { font-size: 18px; min-width: 140px; }
  footer.hints { padding: 8px 14px; gap: 12px; }
  footer.hints span { font-size: 10px; }
  .mode-badge { display: none; }
}
</style>
</head>
<body data-mode="bars">

<header class="top">
  <h1>Tick Timeline</h1>
  <p>Adaptive bars + time ruler — shared canvas engine</p>
  <span class="mode-badge">Canvas · 2D</span>
</header>

<div class="controls">
  <div class="group">
    <label>Mode</label>
    <select id="mode">
      <option value="bars" selected>Bars</option>
      <option value="time">Time</option>
    </select>
  </div>

  <div class="group" data-mode-bars>
    <label>BPM</label>
    <input id="bpm" type="number" min="20" max="300" step="0.5" value="120">
  </div>

  <div class="group" data-mode-bars>
    <label>Sig</label>
    <input id="tsNum" type="number" min="1" max="32" value="4" style="width:30px">
    <span class="sep">/</span>
    <select id="tsDen">
      <option>2</option><option selected>4</option><option>8</option><option>16</option>
    </select>
  </div>

  <div class="group" data-mode-bars>
    <label>Snap</label>
    <select id="snapBars">
      <option value="0">Off</option>
      <option value="4">Bar</option>
      <option value="1" selected>Beat</option>
      <option value="0.5">1/8</option>
      <option value="0.25">1/16</option>
    </select>
  </div>

  <div class="group" data-mode-time>
    <label>Snap</label>
    <select id="snapTime">
      <option value="0">Off</option>
      <option value="60">1 min</option>
      <option value="10">10 sec</option>
      <option value="1" selected>1 sec</option>
      <option value="0.1">100 ms</option>
      <option value="0.01">10 ms</option>
    </select>
  </div>

  <div class="group">
    <label>Theme</label>
    <select id="theme">
      <option value="ableton" selected>Ableton</option>
      <option value="bitwig">Bitwig</option>
      <option value="logic">Logic</option>
      <option value="lockstep">Lockstep</option>
    </select>
  </div>

  <div class="group">
    <label>Zoom</label>
    <input id="zoom" type="range" min="0" max="1000" step="1" value="750" style="width:140px">
  </div>

  <div class="spacer"></div>

  <button class="btn" id="goStart" title="Go to start (Home)">⏮</button>
  <button class="btn primary" id="play" title="Play / Pause (Space)">▶ Play</button>
  <button class="btn" id="stop" title="Stop">■</button>
</div>

<div class="transport">
  <div class="readout-big" id="readoutBig">1.1.1</div>
  <div class="readout-small" id="readoutSmall">0.000s</div>
  <div class="spacer"></div>
  <div class="readout-small" id="status">— stopped</div>
</div>

<div class="stage">
  <canvas id="tickCanvas"></canvas>
</div>

<footer class="hints">
  <span><kbd>Space</kbd>play</span>
  <span><kbd>←</kbd><kbd>→</kbd>nudge</span>
  <span><kbd>Home</kbd>start</span>
  <span><kbd>Click</kbd>seek</span>
  <span><kbd>Drag</kbd>scrub</span>
  <span><kbd>Wheel</kbd>scroll</span>
  <span><kbd>⌘</kbd>+wheel: zoom</span>
  <span><kbd>Tap</kbd>seek · <kbd>Pinch</kbd>zoom</span>
</footer>

<script type="module">
import { drawRuler, RULER_H, resizeCanvas, makeZoomMapper } from '../src/components/TickRuler/engine.js'
import { chooseLayers, formatBBT, formatHMS } from '../src/components/TickRuler/strategies.js'
import { TICK_RULER_THEMES } from '../src/components/TickRuler/themes.js'

// -------- State --------
const state = {
  mode: 'bars',          // 'bars' | 'time'
  zoom: 48,              // px per beat (bars) or px per second (time)
  scroll: 0,
  playhead: 0,           // beats or seconds
  // bars-only:
  bpm: 120,
  beatsPerBar: 4,
  snapBars: 1,
  // time-only:
  snapTime: 1,
  theme: 'ableton',
  playing: false,
  lastTime: 0,
}

// Bars mode: 0.025..600 ppb. Time mode: 0.05..1000 pps.
let zoomMapper = makeZoomMapper(0.025, 600)

const canvas = document.getElementById('tickCanvas')
const zoomSlider = document.getElementById('zoom')

// Per-mode default zooms so the slider lands in a sensible place when toggling.
const defaultZoomByMode = { bars: 48, time: 51 }

function applyModeBounds() {
  if (state.mode === 'time') zoomMapper = makeZoomMapper(0.05, 1000)
  else zoomMapper = makeZoomMapper(0.025, 600)
}

// -------- Render --------
function draw() {
  const { ctx, cssW, cssH } = resizeCanvas(canvas)
  const stratState = state.mode === 'bars'
    ? { mode: 'bars', zoom: state.zoom, beatsPerBar: state.beatsPerBar }
    : { mode: 'time', zoom: state.zoom }
  const layers = chooseLayers(stratState)
  const theme = TICK_RULER_THEMES[state.theme]
  const fontFamily = getComputedStyle(document.body).fontFamily
  drawRuler(ctx, cssW, cssH, layers, state.scroll, state.zoom, theme, state.playhead, fontFamily)
}

new ResizeObserver(draw).observe(canvas)

// -------- Helpers --------
function snapValue(v) {
  const s = state.mode === 'bars' ? state.snapBars : state.snapTime
  if (!s) return v
  return Math.round(v / s) * s
}
function pxToUnit(px) { return (px + state.scroll) / state.zoom }

function updateReadout() {
  const big = document.getElementById('readoutBig')
  const small = document.getElementById('readoutSmall')
  if (state.mode === 'bars') {
    big.textContent = formatBBT(state.playhead, state.beatsPerBar)
    const seconds = state.playhead * 60 / state.bpm
    small.textContent = formatHMS(seconds)
  } else {
    big.textContent = formatHMS(state.playhead)
    small.textContent = `${state.playhead.toFixed(3)}s`
  }
}

function setPlayhead(unit, withSnap) {
  let u = withSnap ? snapValue(unit) : unit
  if (u < 0) u = 0
  state.playhead = u
  updateReadout()
  draw()
}

function ensurePlayheadVisible() {
  const px = state.playhead * state.zoom - state.scroll
  const margin = 60
  const cssW = canvas.getBoundingClientRect().width
  if (px < margin) state.scroll = Math.max(0, state.playhead * state.zoom - margin)
  else if (px > cssW - margin) state.scroll = Math.max(0, state.playhead * state.zoom - (cssW - margin))
}

// -------- Mouse --------
let drag = null
canvas.addEventListener('mousedown', (e) => {
  const rect = canvas.getBoundingClientRect()
  const x = e.clientX - rect.left
  if (e.altKey || e.button === 1) {
    drag = { mode: 'pan', startX: e.clientX, startScroll: state.scroll }
    canvas.classList.add('panning')
    e.preventDefault()
    return
  }
  setPlayhead(pxToUnit(x), true)
  drag = { mode: 'scrub' }
  canvas.classList.add('scrubbing')
})
window.addEventListener('mousemove', (e) => {
  if (!drag) return
  const rect = canvas.getBoundingClientRect()
  if (drag.mode === 'pan') {
    state.scroll = Math.max(0, drag.startScroll - (e.clientX - drag.startX))
    draw()
  } else {
    setPlayhead(pxToUnit(e.clientX - rect.left), true)
  }
})
window.addEventListener('mouseup', () => {
  drag = null
  canvas.classList.remove('scrubbing', 'panning')
})

// -------- Touch --------
let touch = null
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault()
  const rect = canvas.getBoundingClientRect()
  if (e.touches.length === 1) {
    setPlayhead(pxToUnit(e.touches[0].clientX - rect.left), true)
    touch = { mode: 'scrub' }
  } else if (e.touches.length === 2) {
    const t0 = e.touches[0], t1 = e.touches[1]
    const cx = (t0.clientX + t1.clientX) / 2 - rect.left
    const dist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY)
    touch = { mode: 'pinch', distance0: dist, zoom0: state.zoom, unitAtCenter: pxToUnit(cx) }
  }
}, { passive: false })

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault()
  if (!touch) return
  const rect = canvas.getBoundingClientRect()
  if (touch.mode === 'scrub' && e.touches.length === 1) {
    setPlayhead(pxToUnit(e.touches[0].clientX - rect.left), true)
  } else if (touch.mode === 'pinch' && e.touches.length >= 2) {
    const t0 = e.touches[0], t1 = e.touches[1]
    const cx = (t0.clientX + t1.clientX) / 2 - rect.left
    const dist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY)
    state.zoom = touch.zoom0 * (dist / touch.distance0)
    state.scroll = Math.max(0, touch.unitAtCenter * state.zoom - cx)
    zoomSlider.value = zoomMapper.zoomToSlider(state.zoom)
    draw()
  }
}, { passive: false })

canvas.addEventListener('touchend', (e) => { if (e.touches.length === 0) touch = null }, { passive: false })
canvas.addEventListener('touchcancel', () => { touch = null }, { passive: false })

// -------- Wheel --------
canvas.addEventListener('wheel', (e) => {
  e.preventDefault()
  if (e.ctrlKey || e.metaKey) {
    const rect = canvas.getBoundingClientRect()
    const x = e.clientX - rect.left
    const unitAt = pxToUnit(x)
    const factor = Math.exp(-e.deltaY * 0.002)
    state.zoom = state.zoom * factor
    state.scroll = Math.max(0, unitAt * state.zoom - x)
    zoomSlider.value = zoomMapper.zoomToSlider(state.zoom)
    draw()
  } else {
    state.scroll = Math.max(0, state.scroll + (e.deltaX !== 0 ? e.deltaX : e.deltaY))
    draw()
  }
}, { passive: false })

// -------- Transport --------
function play() {
  if (state.playing) return
  state.playing = true
  state.lastTime = performance.now()
  document.getElementById('play').textContent = '⏸ Pause'
  document.getElementById('status').textContent = '● playing'
  requestAnimationFrame(tick)
}
function pause() {
  state.playing = false
  document.getElementById('play').textContent = '▶ Play'
  document.getElementById('status').textContent = '— paused'
}
function stop() {
  pause()
  state.playhead = 0
  state.scroll = 0
  document.getElementById('status').textContent = '— stopped'
  updateReadout()
  draw()
}
function tick(now) {
  if (!state.playing) return
  const dt = (now - state.lastTime) / 1000
  state.lastTime = now
  // bars: dt seconds → dt * (bpm/60) beats. time: dt seconds.
  const advance = state.mode === 'bars' ? dt * state.bpm / 60 : dt
  state.playhead += advance
  ensurePlayheadVisible()
  updateReadout()
  draw()
  requestAnimationFrame(tick)
}

document.getElementById('play').addEventListener('click', () => state.playing ? pause() : play())
document.getElementById('stop').addEventListener('click', stop)
document.getElementById('goStart').addEventListener('click', () => {
  state.playhead = 0
  state.scroll = 0
  updateReadout()
  draw()
})

// -------- Keyboard --------
window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return
  if (e.code === 'Space') {
    e.preventDefault()
    state.playing ? pause() : play()
  } else if (e.code === 'Home') {
    e.preventDefault()
    state.playhead = 0
    state.scroll = 0
    updateReadout()
    draw()
  } else if (e.code === 'ArrowLeft') {
    e.preventDefault()
    const step = state.mode === 'bars' ? (e.shiftKey ? state.beatsPerBar : 1) : (e.shiftKey ? 10 : 1)
    setPlayhead(state.playhead - step)
  } else if (e.code === 'ArrowRight') {
    e.preventDefault()
    const step = state.mode === 'bars' ? (e.shiftKey ? state.beatsPerBar : 1) : (e.shiftKey ? 10 : 1)
    setPlayhead(state.playhead + step)
  }
})

// -------- Controls binding --------
document.getElementById('mode').addEventListener('change', (e) => {
  state.mode = e.target.value
  document.body.dataset.mode = state.mode
  applyModeBounds()
  // Reset to a reasonable default zoom for the new mode so the user doesn't
  // land at a confusing position.
  state.zoom = defaultZoomByMode[state.mode]
  state.scroll = 0
  state.playhead = 0
  zoomSlider.value = zoomMapper.zoomToSlider(state.zoom)
  updateReadout()
  draw()
})
document.getElementById('bpm').addEventListener('input', (e) => {
  const v = parseFloat(e.target.value)
  if (!isNaN(v) && v > 0) { state.bpm = v; updateReadout() }
})
document.getElementById('tsNum').addEventListener('input', (e) => {
  const v = parseInt(e.target.value, 10)
  if (!isNaN(v) && v > 0) { state.beatsPerBar = v; updateReadout(); draw() }
})
document.getElementById('snapBars').addEventListener('change', (e) => {
  state.snapBars = parseFloat(e.target.value)
})
document.getElementById('snapTime').addEventListener('change', (e) => {
  state.snapTime = parseFloat(e.target.value)
})
document.getElementById('theme').addEventListener('change', (e) => {
  state.theme = e.target.value
  draw()
})
zoomSlider.addEventListener('input', (e) => {
  const cssW = canvas.getBoundingClientRect().width
  const centerUnit = pxToUnit(cssW / 2)
  state.zoom = zoomMapper.sliderToZoom(parseFloat(e.target.value))
  state.scroll = Math.max(0, centerUnit * state.zoom - cssW / 2)
  draw()
})

// -------- Init --------
draw()
updateReadout()
</script>
</body>
</html>
