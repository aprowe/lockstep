<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lockstep — Canvas Timeline Prototype</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: #0d0b09; }
body { display: flex; flex-direction: column; font-family: ui-monospace, Consolas, monospace; }
header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 8px 12px 7px;
  border-bottom: 1px solid #000;
  background: #1c1915;
}
header h1 {
  font: 600 10px/1 ui-monospace, Consolas, monospace;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #f59e0b;
}
header p { font: 10px/1 ui-monospace, Consolas, monospace; color: #7a6e62; letter-spacing: 0.04em; }
.wrap { flex: 1; overflow: hidden; position: relative; }
canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<header>
  <h1>Lockstep</h1>
  <p>Canvas timeline prototype</p>
</header>
<div class="wrap"><canvas id="c"></canvas></div>
<script>
'use strict'
const canvas = document.getElementById('c')
const ctx = canvas.getContext('2d')

// ── PALETTE (warm-dark theme) ─────────────────────────────
const BG0   = '#0d0b09'   // track body
const BG2   = '#171410'   // rail
const BG4   = '#1c1915'   // toolbar / header
const BGWARP= '#13151c'   // warp zone cool dark
const BLACK = '#000000'
const SOFT  = '#2c2720'
const FG1   = '#e2dbd2'
const FG2   = '#c2b8ae'
const FG3   = '#a09488'
const FG4   = '#7a6e62'
const FG5   = '#5a4e42'

const SP_INPUT  = 'hsl(195,75%,55%)'    // cyan
const SP_WARP   = 'hsl(32,90%,55%)'     // orange
const SP_OUTPUT = 'hsl(280,55%,60%)'    // purple

const MARKER_COLOR      = 'hsl(195,75%,55%)'
const MARKER_HOVER      = 'hsl(195,75%,78%)'
const PLAYHEAD_COLOR    = 'hsl(0,90%,65%)'
const PLAYHEAD_GLOW     = 'hsla(0,90%,65%,0.22)'
const SCENE_COLOR       = 'hsl(48,95%,62%)'
const SCENE_GLOW        = 'hsla(48,95%,62%,0.12)'
const THROUGH_COLOR     = 'hsla(195,85%,75%,0.5)'
const THROUGH_HOVER     = 'hsla(195,85%,70%,0.85)'

const BAR_TICK  = 'rgba(226,219,210,0.75)'
const BEAT_TICK = 'rgba(160,148,136,0.5)'
const SUB_TICK  = 'rgba(90,78,66,0.7)'
const GRID_BAR  = 'rgba(226,219,210,0.038)'
const GRID_BEAT = 'rgba(226,219,210,0.016)'

// Clip colors — exact from src/index.css
const CLIPS = [
  { h:0,   s:75, l:55 },
  { h:30,  s:80, l:52 },
  { h:58,  s:80, l:48 },
  { h:115, s:65, l:45 },
  { h:183, s:65, l:42 },
  { h:213, s:70, l:55 },
  { h:270, s:60, l:55 },
  { h:305, s:65, l:52 },
]
function clipHsl(idx, alpha, lAdj = 0) {
  const c = CLIPS[idx % CLIPS.length]
  const l = Math.max(0, Math.min(100, c.l + lAdj))
  return alpha == null ? `hsl(${c.h},${c.s}%,${l}%)`
    : `hsla(${c.h},${c.s}%,${l}%,${alpha})`
}

// ── LAYOUT ───────────────────────────────────────────────
const RAIL_W    = 72
const MINIMAP_H = 28
const FONT      = 'ui-monospace, Consolas, monospace'

const TRACK_DEFS = [
  { id:'time',      label:'Time',       h:20, space:'input'  },
  { id:'scenes',    label:'Scenes',     h:20, space:'input'  },
  { id:'clipin',    label:'Clip In',    h:30, space:'input'  },
  { id:'markerin',  label:'Anchor In',  h:30, space:'input'  },
  { id:'warp',      label:'Warp',       h:44, space:'warp'   },
  { id:'markerout', label:'Anchor Out', h:30, space:'output' },
  { id:'clipout',   label:'Clip Out',   h:30, space:'output' },
  { id:'beat',      label:'Beats',      h:20, space:'output' },
  { id:'speed',     label:'Speed',      h:22, space:'output' },
]

// ── STATE ────────────────────────────────────────────────
const S = {
  view: { start: 0, end: 30 },
  duration: 32,
  outputDuration: 30.5,
  bpm: 120,
  beatOffset: 0,
  playhead: 2.1,
  beatPlayhead: 1.9,
  beatOffset: 6,   // output seconds where bar 1 beat 1 starts

  anchors: [
    { id:1, time:3.1  }, { id:2, time:6.0  }, { id:3, time:8.9  },
    { id:4, time:12.0 }, { id:5, time:15.1 }, { id:6, time:18.0 },
    { id:7, time:21.2 }, { id:8, time:24.0 },
  ],
  beatAnchors: [
    { id:1, time:3.0  }, { id:2, time:5.8  }, { id:3, time:8.6  },
    { id:4, time:11.5 }, { id:5, time:14.5 }, { id:6, time:17.2 },
    { id:7, time:20.3 }, { id:8, time:23.0 },
  ],

  regions: [
    { id:'r0', label:'Intro', inPoint:0,    outPoint:8.0,  colorIndex:0 },
    { id:'r1', label:'Verse', inPoint:8.0,  outPoint:20.0, colorIndex:1 },
    { id:'r2', label:'Drop',  inPoint:20.0, outPoint:32.0, colorIndex:2 },
  ],
  regionsOutput: [
    { id:'r0', label:'Intro', inPoint:0,    outPoint:7.6,  colorIndex:0 },
    { id:'r1', label:'Verse', inPoint:7.6,  outPoint:19.1, colorIndex:1 },
    { id:'r2', label:'Drop',  inPoint:19.1, outPoint:30.5, colorIndex:2 },
  ],

  scenes: [],
  hoveredAnchorId: null,
  hoveredRegionId: null,
}

// ── DERIVED LAYOUT ───────────────────────────────────────
let tracks = []
let W = 0, H = 0
function BW() { return W - RAIL_W }

function buildLayout() {
  tracks = []
  let y = MINIMAP_H + 1
  for (const def of TRACK_DEFS) {
    tracks.push({ ...def, y })
    y += def.h + 1   // 1px black gap between tracks
  }
}
const byId = id => tracks.find(t => t.id === id)

function spaceRange(space) {
  const ts = tracks.filter(t => t.space === space)
  if (!ts.length) return null
  return { top: ts[0].y, bottom: ts[ts.length-1].y + ts[ts.length-1].h }
}

// ── COORDINATES ──────────────────────────────────────────
const tX   = t => RAIL_W + ((t - S.view.start) / (S.view.end - S.view.start)) * BW()
const xToT = x => S.view.start + ((x - RAIL_W) / BW()) * (S.view.end - S.view.start)

function clampView(start, end) {
  const span = end - start
  const max  = Math.max(S.duration, S.outputDuration)
  if (start < 0) return { start: 0, end: span }
  if (end > max + span * 0.05) return { start: max - span, end: max }
  return { start, end }
}

// ── HIT TESTING ──────────────────────────────────────────
let hits = []
const clearHits = () => { hits = [] }
const addHit = (x, y, w, h, data) => hits.push({ x, y, w, h, data })
function hitAt(px, py) {
  for (let i = hits.length - 1; i >= 0; i--) {
    const h = hits[i]
    if (px >= h.x && px <= h.x + h.w && py >= h.y && py <= h.y + h.h) return h.data
  }
  return null
}

// ── RESIZE ───────────────────────────────────────────────
function resize() {
  const dpr  = window.devicePixelRatio || 1
  const rect = canvas.getBoundingClientRect()
  W = rect.width; H = rect.height
  if (canvas.width  !== Math.round(W * dpr) ||
      canvas.height !== Math.round(H * dpr)) {
    canvas.width  = Math.round(W * dpr)
    canvas.height = Math.round(H * dpr)
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0)
  }
}

// ── TICK STRATEGIES (from TickRuler/strategies.js) ───────
const TARGET_MAJOR_PX = 60

const TIME_TIERS = [
  [0.001,0.0002],[0.002,0.0005],[0.005,0.001],[0.01,0.002],[0.02,0.005],
  [0.05,0.01],[0.1,0.02],[0.2,0.05],[0.5,0.1],[1,0.2],[2,0.5],[5,1],
  [10,2],[15,5],[30,10],[60,15],[120,30],[300,60],[600,120],[1800,300],[3600,600],
]

function timeLayers(pps) {
  let tier = TIME_TIERS[TIME_TIERS.length - 1]
  for (const t of TIME_TIERS) { if (t[0] * pps >= TARGET_MAJOR_PX) { tier = t; break } }
  const [major, sub] = tier
  const ratio = Math.round(major / sub)
  const layers = []
  if (sub * pps >= 6) layers.push({ spacingUnit:sub, styleKey:'sub', tickHeight:5, skipModulo:ratio })
  layers.push({ spacingUnit:major, styleKey:'bar', isMajor:true,
    label:(s) => fmtTime(s), labelStyle:'major' })
  return layers
}

function barsLayers(ppb, beatsPerBar) {
  const ppbar = ppb * beatsPerBar
  let barGroup = 1
  while (ppbar * barGroup < TARGET_MAJOR_PX) barGroup *= 2
  if (barGroup > 4096) barGroup = 4096
  let subBarGroup = barGroup >= 8 ? barGroup / 8 : barGroup >= 2 ? 1 : 0
  const showSixteenths = barGroup === 1 && ppb / 4 >= 6
  const showEighths    = barGroup === 1 && !showSixteenths && ppb / 2 >= 9
  const showBeats      = barGroup === 1 && ppb >= 22
  const labelBeats     = barGroup === 1 && ppb >= 70
  const layers = []
  if (showSixteenths) layers.push({ spacingUnit:0.25, styleKey:'sub', tickHeight:4, skipModulo:4 })
  else if (showEighths) layers.push({ spacingUnit:0.5, styleKey:'sub', tickHeight:5, skipModulo:2 })
  if (showBeats) {
    layers.push({ spacingUnit:1, styleKey:'beat', tickHeight:9, skipModulo:beatsPerBar,
      label: labelBeats ? (b) => {
        const bar = Math.floor(b / beatsPerBar)
        return `${bar >= 0 ? bar+1 : bar}.${Math.floor(b % beatsPerBar)+1}`
      } : null, labelStyle:'minor' })
  }
  if (subBarGroup > 0) layers.push({ spacingUnit:subBarGroup*beatsPerBar,
    styleKey:'beat', tickHeight:11, skipModulo:barGroup/subBarGroup })
  layers.push({ spacingUnit:barGroup*beatsPerBar, styleKey:'bar', isMajor:true,
    label:(b) => { const bar=Math.floor(b/beatsPerBar); return String(bar>=0?bar+1:bar) },
    labelStyle:'major' })
  return layers
}

// ── UTILS ────────────────────────────────────────────────
function fmtTime(s) {
  if (s < 0) s = 0
  const span = S.view.end - S.view.start
  const decimals = span < 2 ? 3 : 2
  const intPart  = Math.floor(s)
  const fracStr  = (s - intPart).toFixed(decimals).slice(1) // ".XX"
  return `${String(intPart).padStart(2, '0')}${fracStr}s`
}

function clip(fn) {
  ctx.save()
  ctx.beginPath()
  ctx.rect(RAIL_W, MINIMAP_H, BW(), H)
  ctx.clip()
  fn()
  ctx.restore()
}

function setFont(size, bold) {
  ctx.font = `${bold ? '600 ' : ''}${size}px ${FONT}`
}

// ── DRAW: BACKGROUNDS ────────────────────────────────────
function drawBgs() {
  ctx.fillStyle = BG0
  ctx.fillRect(0, 0, W, H)

  for (const tr of tracks) {
    ctx.fillStyle = tr.space === 'warp' ? BGWARP : BG0
    ctx.fillRect(RAIL_W, tr.y, BW(), tr.h)
    // 1px black gap below
    ctx.fillStyle = BLACK
    ctx.fillRect(RAIL_W, tr.y + tr.h, BW(), 1)
  }
}

// ── DRAW: RAILS ──────────────────────────────────────────
function drawRails() {
  // full rail column bg
  ctx.fillStyle = BG2
  ctx.fillRect(0, MINIMAP_H, RAIL_W, H)

  for (const tr of tracks) {
    // 1px right border
    ctx.fillStyle = BLACK
    ctx.fillRect(RAIL_W - 1, tr.y, 1, tr.h + 1)

    // label (left-aligned, 8px padding)
    ctx.fillStyle = FG4
    setFont(10, false)
    ctx.textAlign    = 'left'
    ctx.textBaseline = 'middle'
    ctx.fillText(tr.label.toUpperCase(), 8, tr.y + tr.h / 2)
  }

  // space accent bar — 3px left edge colored by space
  const inp  = spaceRange('input')
  const warp = byId('warp')
  const out  = spaceRange('output')
  if (inp)  { ctx.fillStyle = SP_INPUT;  ctx.fillRect(0, inp.top,  3, inp.bottom  - inp.top) }
  if (warp) { ctx.fillStyle = SP_WARP;   ctx.fillRect(0, warp.y,  3, warp.h) }
  if (out)  { ctx.fillStyle = SP_OUTPUT; ctx.fillRect(0, out.top, 3, out.bottom - out.top) }

  // rail right border full height
  ctx.fillStyle = BLACK
  ctx.fillRect(RAIL_W - 1, 0, 1, H)
}

// ── DRAW: MINIMAP ────────────────────────────────────────
function drawMinimap() {
  const max = Math.max(S.duration, S.outputDuration)
  const mW  = BW()

  // bg
  ctx.fillStyle = BG4
  ctx.fillRect(0, 0, W, MINIMAP_H)

  // region bars
  for (const r of S.regions) {
    const x1 = RAIL_W + (r.inPoint  / max) * mW
    const x2 = RAIL_W + (r.outPoint / max) * mW
    ctx.fillStyle = clipHsl(r.colorIndex, 0.55)
    ctx.fillRect(x1, 3, x2 - x1, MINIMAP_H - 6)
    // left/right edges
    ctx.fillStyle = clipHsl(r.colorIndex, 0.9)
    ctx.fillRect(x1, 3, 1, MINIMAP_H - 6)
    ctx.fillRect(x2 - 1, 3, 1, MINIMAP_H - 6)
  }

  // anchor ticks
  for (const a of S.anchors) {
    const x = RAIL_W + (a.time / max) * mW
    ctx.fillStyle = 'rgba(160,148,136,0.45)'
    ctx.fillRect(Math.round(x), 5, 1, MINIMAP_H - 10)
  }

  // view window
  const vx1 = RAIL_W + (S.view.start / max) * mW
  const vx2 = RAIL_W + (S.view.end   / max) * mW
  ctx.fillStyle = 'rgba(255,255,255,0.04)'
  ctx.fillRect(vx1, 0, vx2 - vx1, MINIMAP_H)
  ctx.strokeStyle = 'rgba(255,255,255,0.2)'
  ctx.lineWidth = 1
  ctx.strokeRect(vx1 + 0.5, 0.5, vx2 - vx1 - 1, MINIMAP_H - 1)

  // playhead
  const phx = RAIL_W + (S.playhead / max) * mW
  ctx.fillStyle = PLAYHEAD_COLOR
  ctx.fillRect(Math.round(phx), 0, 1, MINIMAP_H)

  // rail cell
  ctx.fillStyle = BG2
  ctx.fillRect(0, 0, RAIL_W, MINIMAP_H)
  ctx.fillStyle = FG4
  setFont(9, false)
  ctx.textAlign    = 'left'
  ctx.textBaseline = 'middle'
  ctx.fillText('OVERVIEW', 8, MINIMAP_H / 2)

  // bottom border
  ctx.fillStyle = BLACK
  ctx.fillRect(0, MINIMAP_H, W, 1)
}

// ── DRAW: TIME RULER ─────────────────────────────────────
function drawTickLayer(tr, layer, getX, gridBottom) {
  const tickColor = layer.styleKey === 'bar' ? BAR_TICK : layer.styleKey === 'beat' ? BEAT_TICK : SUB_TICK
  const gridColor = layer.styleKey === 'bar' ? GRID_BAR : layer.styleKey === 'beat' ? GRID_BEAT : 'rgba(0,0,0,0)'
  const tickTop   = layer.isMajor ? tr.y + 3 : tr.y + tr.h - (layer.tickHeight ?? 6)

  ctx.strokeStyle = gridColor; ctx.lineWidth = 1; ctx.beginPath()
  for (const [i, x] of getX(layer)) { ctx.moveTo(x, tr.y + tr.h); ctx.lineTo(x, gridBottom) }
  ctx.stroke()

  ctx.strokeStyle = tickColor; ctx.lineWidth = layer.isMajor ? 1.5 : 1; ctx.beginPath()
  for (const [i, x] of getX(layer)) { ctx.moveTo(x, tickTop); ctx.lineTo(x, tr.y + tr.h - 1) }
  ctx.stroke()

  if (layer.label) {
    const isMajor = layer.labelStyle === 'major'
    ctx.fillStyle = isMajor ? FG1 : FG3
    setFont(isMajor ? 10 : 9, isMajor)
    ctx.textAlign = 'left'; ctx.textBaseline = 'top'
    for (const [i, x, unit] of getX(layer)) {
      const text = layer.label(unit)
      if (text != null) ctx.fillText(text, x + 3, tr.y + (isMajor ? 3 : 5))
    }
  }
}

function drawTimeRuler() {
  const tr = byId('time')
  if (!tr) return
  const pps    = BW() / (S.view.end - S.view.start)
  const layers = timeLayers(pps)

  for (const layer of layers) {
    const su       = layer.spacingUnit
    const firstIdx = Math.floor(S.view.start / su) - 1
    const lastIdx  = Math.ceil(S.view.end    / su) + 1
    function* getX() {
      for (let i = firstIdx; i <= lastIdx; i++) {
        if (layer.skipModulo && i % layer.skipModulo === 0) continue
        const t = i * su
        if (t < 0 || t > S.duration + 1e-6) continue
        const x = Math.round(RAIL_W + (t - S.view.start) * pps) + 0.5
        if (x < RAIL_W || x > W) continue
        yield [i, x, t]
      }
    }
    drawTickLayer(tr, layer, getX, H)
  }
}

// ── DRAW: SCENES ─────────────────────────────────────────
function drawScenes() {
  const tr = byId('scenes')
  if (!tr) return
  const cy = tr.y + tr.h / 2
  const R  = 4

  for (const t of S.scenes) {
    const x = tX(t)
    if (x < RAIL_W - 8 || x > W + 8) continue
    ctx.fillStyle = SCENE_COLOR
    ctx.beginPath()
    ctx.moveTo(x, cy - R); ctx.lineTo(x + R, cy)
    ctx.lineTo(x, cy + R); ctx.lineTo(x - R, cy)
    ctx.closePath(); ctx.fill()
    addHit(x - 8, tr.y, 16, tr.h, { type:'scene', time: t })
  }
}

// ── DRAW: REGIONS ────────────────────────────────────────
function drawRegionTrack(tr, regions, isOutput) {
  if (!tr) return
  const lAdj = isOutput ? -18 : 0

  for (const r of regions) {
    const x1 = tX(r.inPoint)
    const x2 = tX(r.outPoint)
    if (x2 < RAIL_W || x1 > W) continue

    const cx1 = Math.max(x1, RAIL_W)
    const cx2 = Math.min(x2, W)
    const cw  = cx2 - cx1
    const isHov = S.hoveredRegionId === r.id

    // fill
    ctx.fillStyle = clipHsl(r.colorIndex, isHov ? 0.42 : 0.32, lAdj)
    ctx.fillRect(cx1, tr.y + 2, cw, tr.h - 4)

    // inset border (box-shadow equivalent: 1px solid on all sides)
    ctx.strokeStyle = clipHsl(r.colorIndex, isHov ? 1 : 0.95, lAdj)
    ctx.lineWidth = 1
    ctx.strokeRect(cx1 + 0.5, tr.y + 2.5, cw - 1, tr.h - 5)

    // label
    if (cw > 20 && r.label) {
      ctx.fillStyle  = FG1
      ctx.globalAlpha = 0.9
      setFont(10, true)
      ctx.textAlign    = 'left'
      ctx.textBaseline = 'middle'
      ctx.save()
      ctx.beginPath()
      ctx.rect(cx1 + 1, tr.y + 2, cw - 2, tr.h - 4)
      ctx.clip()
      ctx.fillText(r.label, cx1 + 5, tr.y + tr.h / 2)
      ctx.restore()
      ctx.globalAlpha = 1
    }

    // resize handles (transparent hit targets, subtle visual hint on edges)
    if (x1 >= RAIL_W - 4) {
      ctx.fillStyle = clipHsl(r.colorIndex, 0.7, lAdj)
      ctx.fillRect(x1, tr.y + 2, 2, tr.h - 4)
      addHit(x1 - 5, tr.y, 10, tr.h, { type:'region-edge', id:r.id, edge:'in', output:isOutput })
    }
    if (x2 <= W + 4) {
      ctx.fillStyle = clipHsl(r.colorIndex, 0.7, lAdj)
      ctx.fillRect(x2 - 2, tr.y + 2, 2, tr.h - 4)
      addHit(x2 - 5, tr.y, 10, tr.h, { type:'region-edge', id:r.id, edge:'out', output:isOutput })
    }

    addHit(cx1, tr.y, cw, tr.h, { type:'region', id:r.id })
  }
}

// ── DRAW: ANCHOR MARKERS ─────────────────────────────────
const TRI_HALF = 6
const TRI_H    = 9

function drawAnchorIn(x, tr, hovered) {
  // Triangle at top, apex pointing DOWN; line drops from apex to bottom
  if (x < RAIL_W - TRI_HALF - 2 || x > W + TRI_HALF + 2) return
  const color = hovered ? MARKER_HOVER : MARKER_COLOR
  ctx.fillStyle   = color
  ctx.strokeStyle = color
  ctx.lineWidth   = hovered ? 2 : 1.5

  const apexY = tr.y + TRI_H

  ctx.beginPath()
  ctx.moveTo(x - TRI_HALF, tr.y)
  ctx.lineTo(x + TRI_HALF, tr.y)
  ctx.lineTo(x, apexY)
  ctx.closePath()
  ctx.fill()

  ctx.beginPath()
  ctx.moveTo(x, apexY)
  ctx.lineTo(x, tr.y + tr.h - 1)
  ctx.stroke()
}

function drawAnchorOut(x, tr, hovered) {
  // Triangle at bottom, apex pointing UP; line rises from apex to top
  if (x < RAIL_W - TRI_HALF - 2 || x > W + TRI_HALF + 2) return
  const color = hovered ? MARKER_HOVER : MARKER_COLOR
  ctx.fillStyle   = color
  ctx.strokeStyle = color
  ctx.lineWidth   = hovered ? 2 : 1.5

  const apexY = tr.y + tr.h - TRI_H

  ctx.beginPath()
  ctx.moveTo(x - TRI_HALF, tr.y + tr.h)
  ctx.lineTo(x + TRI_HALF, tr.y + tr.h)
  ctx.lineTo(x, apexY)
  ctx.closePath()
  ctx.fill()

  ctx.beginPath()
  ctx.moveTo(x, tr.y + 1)
  ctx.lineTo(x, apexY)
  ctx.stroke()
}

function drawAnchors() {
  const trIn  = byId('markerin')
  const trOut = byId('markerout')

  if (trIn) {
    for (const a of S.anchors) {
      const x = tX(a.time)
      drawAnchorIn(x, trIn, S.hoveredAnchorId === a.id)
      addHit(x - TRI_HALF - 2, trIn.y, (TRI_HALF + 2) * 2, trIn.h,
        { type:'anchor', id:a.id, space:'input' })
    }
  }
  if (trOut) {
    for (const a of S.beatAnchors) {
      const x = tX(a.time)
      drawAnchorOut(x, trOut, S.hoveredAnchorId === a.id)
      addHit(x - TRI_HALF - 2, trOut.y, (TRI_HALF + 2) * 2, trOut.h,
        { type:'anchor', id:a.id, space:'output' })
    }
  }
}

// ── DRAW: WARP CONNECTOR ─────────────────────────────────
function drawWarp() {
  const tr = byId('warp')
  if (!tr) return
  const inY  = tr.y
  const outY = tr.y + tr.h
  const n    = Math.min(S.anchors.length, S.beatAnchors.length)

  ctx.save()
  ctx.beginPath()
  ctx.rect(RAIL_W, tr.y, BW(), tr.h)
  ctx.clip()

  // region fills in warp zone (input region boundaries → output region boundaries)
  for (let ri = 0; ri < Math.min(S.regions.length, S.regionsOutput.length); ri++) {
    const rIn  = S.regions[ri]
    const rOut = S.regionsOutput[ri]
    const x0 = tX(rIn.inPoint);   const x1 = tX(rIn.outPoint)
    const x2 = tX(rOut.outPoint); const x3 = tX(rOut.inPoint)
    ctx.fillStyle = clipHsl(rIn.colorIndex, 0.06)
    ctx.beginPath()
    ctx.moveTo(x0, inY);  ctx.lineTo(x1, inY)
    ctx.lineTo(x2, outY); ctx.lineTo(x3, outY)
    ctx.closePath(); ctx.fill()
    // region edge lines (clip color)
    ctx.strokeStyle = clipHsl(rIn.colorIndex, 0.45)
    ctx.lineWidth = 1
    ctx.beginPath(); ctx.moveTo(x0, inY); ctx.lineTo(x3, outY); ctx.stroke()
    ctx.beginPath(); ctx.moveTo(x1, inY); ctx.lineTo(x2, outY); ctx.stroke()
  }

  // anchor diagonal lines (orange, solid)
  ctx.strokeStyle = SP_WARP
  ctx.lineWidth = 1
  for (let i = 0; i < n; i++) {
    const ix = tX(S.anchors[i].time)
    const ox = tX(S.beatAnchors[i].time)
    ctx.beginPath()
    ctx.moveTo(ix + 0.5, inY)
    ctx.lineTo(ox + 0.5, outY)
    ctx.stroke()
  }

  ctx.restore()

  // top/bottom borders
  ctx.fillStyle = BLACK
  ctx.fillRect(RAIL_W, inY,      BW(), 1)
  ctx.fillRect(RAIL_W, outY - 1, BW(), 1)
}

// ── DRAW: BEAT RULER ─────────────────────────────────────
function drawBeatRuler() {
  const tr = byId('beat')
  if (!tr) return
  const pps     = BW() / (S.view.end - S.view.start)
  const beatSec = 60 / S.bpm
  const ppb     = pps * beatSec
  const bpb     = 4
  const layers  = barsLayers(ppb, bpb)

  for (const layer of layers) {
    const su            = layer.spacingUnit   // in beats
    const viewStartBeat = (S.view.start - S.beatOffset) / beatSec
    const viewEndBeat   = (S.view.end   - S.beatOffset) / beatSec
    const firstIdx      = Math.floor(viewStartBeat / su) - 1
    const lastIdx       = Math.ceil(viewEndBeat    / su) + 1
    function* getX() {
      for (let i = firstIdx; i <= lastIdx; i++) {
        if (layer.skipModulo && i % layer.skipModulo === 0) continue
        const beatVal = i * su
        const t = S.beatOffset + beatVal * beatSec
        if (t < -1e-6 || t > S.outputDuration + 1e-6) continue
        const x = Math.round(RAIL_W + (t - S.view.start) * pps) + 0.5
        if (x < RAIL_W || x > W) continue
        yield [i, x, beatVal]
      }
    }
    drawTickLayer(tr, layer, getX, H)
  }
}

// ── DRAW: SPEED ──────────────────────────────────────────
function drawSpeed() {
  const tr = byId('speed')
  if (!tr) return
  const n = Math.min(S.anchors.length, S.beatAnchors.length)
  if (n < 2) return

  for (let i = 0; i < n - 1; i++) {
    const inSpan  = S.anchors[i+1].time     - S.anchors[i].time
    const outSpan = S.beatAnchors[i+1].time - S.beatAnchors[i].time
    if (inSpan <= 0) continue
    const speed = outSpan / inSpan

    const x1  = tX(S.beatAnchors[i].time)
    const x2  = tX(S.beatAnchors[i+1].time)
    const cx1 = Math.max(x1, RAIL_W)
    const cx2 = Math.min(x2, W)
    if (cx2 <= cx1) continue

    const dev = speed - 1
    const a   = Math.min(0.7, Math.abs(dev) * 3 + 0.12)
    ctx.fillStyle = speed < 1
      ? `rgba(96,165,250,${a})`    // blue = slow
      : `rgba(239,68,68,${a})`     // red = fast
    ctx.fillRect(cx1 + 1, tr.y + 3, cx2 - cx1 - 2, tr.h - 6)

    if (cx2 - cx1 > 28) {
      ctx.fillStyle = FG2
      setFont(9, false)
      ctx.textAlign    = 'center'
      ctx.textBaseline = 'middle'
      ctx.fillText(`${speed.toFixed(2)}×`, (cx1 + cx2) / 2, tr.y + tr.h / 2)
    }
  }
}

// ── DRAW: THROUGH-LINES ──────────────────────────────────
function drawThroughLines() {
  const inp  = spaceRange('input')
  const out  = spaceRange('output')
  const warp = byId('warp')
  if (!inp || !out) return

  const n = Math.min(S.anchors.length, S.beatAnchors.length)
  ctx.setLineDash([2, 2])
  ctx.lineWidth = 1

  for (let i = 0; i < n; i++) {
    const a   = S.anchors[i]
    const b   = S.beatAnchors[i]
    const hov = S.hoveredAnchorId === a.id
    ctx.strokeStyle = hov ? THROUGH_HOVER : THROUGH_COLOR

    const inX  = tX(a.time)
    const outX = tX(b.time)

    if (inX >= RAIL_W && inX <= W) {
      ctx.beginPath()
      ctx.moveTo(inX + 0.5, inp.top)
      ctx.lineTo(inX + 0.5, inp.bottom)
      ctx.stroke()
    }
    if (warp) {
      ctx.beginPath()
      ctx.moveTo(inX  + 0.5, warp.y)
      ctx.lineTo(outX + 0.5, warp.y + warp.h)
      ctx.stroke()
    }
    if (outX >= RAIL_W && outX <= W) {
      ctx.beginPath()
      ctx.moveTo(outX + 0.5, out.top)
      ctx.lineTo(outX + 0.5, out.bottom)
      ctx.stroke()
    }
  }

  ctx.setLineDash([])
}

// ── DRAW: PLAYHEAD ───────────────────────────────────────
function drawPlayhead() {
  const inp  = spaceRange('input')
  const out  = spaceRange('output')
  const warp = byId('warp')
  const timeTr = byId('time')

  function vline(x, y1, y2, glow) {
    const px = Math.round(x) + 0.5
    if (px < RAIL_W - 2 || px > W + 2) return
    if (glow) {
      ctx.strokeStyle = PLAYHEAD_GLOW
      ctx.lineWidth = 3
      ctx.beginPath(); ctx.moveTo(px, y1); ctx.lineTo(px, y2); ctx.stroke()
    }
    ctx.strokeStyle = PLAYHEAD_COLOR
    ctx.lineWidth = 1
    ctx.beginPath(); ctx.moveTo(px, y1); ctx.lineTo(px, y2); ctx.stroke()
  }

  const inPx  = tX(S.playhead)
  const outPx = tX(S.beatPlayhead)

  if (inp) vline(inPx, inp.top, inp.bottom, true)
  if (warp) {
    ctx.strokeStyle = PLAYHEAD_GLOW; ctx.lineWidth = 3
    ctx.beginPath(); ctx.moveTo(inPx + 0.5, warp.y); ctx.lineTo(outPx + 0.5, warp.y + warp.h); ctx.stroke()
    ctx.strokeStyle = PLAYHEAD_COLOR; ctx.lineWidth = 1
    ctx.beginPath(); ctx.moveTo(inPx + 0.5, warp.y); ctx.lineTo(outPx + 0.5, warp.y + warp.h); ctx.stroke()
  }
  if (out) vline(outPx, out.top, out.bottom, true)

  // Arrow at top of time row (pointing DOWN)
  if (timeTr && inPx >= RAIL_W && inPx <= W) {
    const ax = Math.round(inPx)
    const ay = timeTr.y
    ctx.fillStyle = PLAYHEAD_COLOR
    ctx.beginPath()
    ctx.moveTo(ax - 5, ay)
    ctx.lineTo(ax + 6, ay)
    ctx.lineTo(ax + 0.5, ay + 8)
    ctx.closePath()
    ctx.fill()
  }
}

// ── DRAW: HOVER CURSOR ───────────────────────────────────
let hoverX = null
function drawHoverCursor() {
  if (hoverX === null || hoverX < RAIL_W) return
  const bot = tracks.length ? tracks[tracks.length-1].y + tracks[tracks.length-1].h : H
  ctx.strokeStyle = 'rgba(226,219,210,0.1)'
  ctx.lineWidth = 1
  ctx.beginPath()
  ctx.moveTo(hoverX + 0.5, MINIMAP_H + 1)
  ctx.lineTo(hoverX + 0.5, bot)
  ctx.stroke()
}

// ── MAIN DRAW ────────────────────────────────────────────
function draw() {
  resize()
  buildLayout()
  clearHits()

  drawBgs()
  drawMinimap()

  clip(() => {
    drawTimeRuler()
    drawScenes()
    drawRegionTrack(byId('clipin'),  S.regions,       false)
    drawRegionTrack(byId('clipout'), S.regionsOutput, true)
    drawThroughLines()
    drawWarp()
    drawAnchors()
    drawBeatRuler()
    drawSpeed()
    drawPlayhead()
    drawHoverCursor()
  })

  drawRails()
}

// ── INTERACTIONS ─────────────────────────────────────────
let drag = null

canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect()
  const mx = e.clientX - rect.left
  const my = e.clientY - rect.top

  // minimap
  if (my >= 0 && my < MINIMAP_H && mx >= RAIL_W) {
    const max  = Math.max(S.duration, S.outputDuration)
    const t    = ((mx - RAIL_W) / BW()) * max
    const span = S.view.end - S.view.start
    S.view = clampView(t - span / 2, t + span / 2)
    drag = { type:'minimap' }
    draw(); return
  }

  if (mx < RAIL_W) return

  const hit = hitAt(mx, my)
  if (hit?.type === 'anchor') {
    drag = { type:'anchor', id:hit.id, space:hit.space }; return
  }
  if (hit?.type === 'region-edge') {
    drag = { type:'region-edge', id:hit.id, edge:hit.edge, output:hit.output }; return
  }

  if (e.altKey || e.button === 1) {
    drag = { type:'pan', startX:e.clientX, startView:{ ...S.view } }
    canvas.style.cursor = 'grabbing'; return
  }

  // seek
  const t = Math.max(0, Math.min(S.duration, xToT(mx)))
  S.playhead = t
  S.beatPlayhead = t * (S.outputDuration / S.duration)
  drag = { type:'seek' }
  draw()
})

window.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect()
  const mx = e.clientX - rect.left
  const my = e.clientY - rect.top

  if (drag) {
    if (drag.type === 'pan') {
      const dx = e.clientX - drag.startX
      const span = drag.startView.end - drag.startView.start
      const dt = -(dx / BW()) * span
      S.view = clampView(drag.startView.start + dt, drag.startView.end + dt)
      draw(); return
    }
    if (drag.type === 'seek') {
      const t = Math.max(0, Math.min(S.duration, xToT(mx)))
      S.playhead = t
      S.beatPlayhead = t * (S.outputDuration / S.duration)
      draw(); return
    }
    if (drag.type === 'minimap') {
      const max  = Math.max(S.duration, S.outputDuration)
      const t    = ((mx - RAIL_W) / BW()) * max
      const span = S.view.end - S.view.start
      S.view = clampView(t - span / 2, t + span / 2)
      draw(); return
    }
    if (drag.type === 'anchor') {
      const t   = Math.max(0, xToT(mx))
      const arr = drag.space === 'input' ? S.anchors : S.beatAnchors
      const a   = arr.find(a => a.id === drag.id)
      if (a) { a.time = t; draw() }
      return
    }
    if (drag.type === 'region-edge') {
      const t   = Math.max(0, xToT(mx))
      const arr = drag.output ? S.regionsOutput : S.regions
      const r   = arr.find(r => r.id === drag.id)
      if (r) {
        if (drag.edge === 'in')  r.inPoint  = Math.min(t, r.outPoint - 0.05)
        if (drag.edge === 'out') r.outPoint = Math.max(t, r.inPoint  + 0.05)
        draw()
      }
      return
    }
    return
  }

  // hover detection
  hoverX = (mx >= RAIL_W && my >= MINIMAP_H) ? mx : null
  const hit = (mx >= RAIL_W && my >= MINIMAP_H) ? hitAt(mx, my) : null
  const newA = hit?.type === 'anchor'  ? hit.id : null
  const newR = hit?.type === 'region'  ? hit.id : null
  if (newA !== S.hoveredAnchorId || newR !== S.hoveredRegionId) {
    S.hoveredAnchorId = newA
    S.hoveredRegionId = newR
    draw()
  }
  canvas.style.cursor = hit
    ? (hit.type === 'region-edge' ? 'ew-resize' : 'pointer')
    : 'default'

  // redraw for hover cursor line
  draw()
})

window.addEventListener('mouseup', () => {
  if (drag?.type === 'pan') canvas.style.cursor = 'default'
  drag = null
})
canvas.addEventListener('mouseleave', () => { hoverX = null; draw() })

canvas.addEventListener('wheel', e => {
  e.preventDefault()
  const rect = canvas.getBoundingClientRect()
  const mx   = e.clientX - rect.left
  const span = S.view.end - S.view.start

  if (e.ctrlKey || e.metaKey) {
    const factor  = Math.exp(e.deltaY * 0.003)
    const t       = xToT(mx)
    const ratio   = (t - S.view.start) / span
    const newSpan = Math.max(0.5, Math.min(S.duration * 2, span * factor))
    S.view = clampView(t - ratio * newSpan, t - ratio * newSpan + newSpan)
  } else {
    const dt = ((e.deltaX !== 0 ? e.deltaX : e.deltaY) / BW()) * span
    S.view = clampView(S.view.start + dt, S.view.end + dt)
  }
  draw()
}, { passive: false })

// Space = simple playback
let playTimer = null, lastT = 0
window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return
  if (e.code !== 'Space') return
  e.preventDefault()
  if (playTimer) { clearInterval(playTimer); playTimer = null; return }
  lastT = performance.now()
  playTimer = setInterval(() => {
    const now = performance.now()
    const dt  = (now - lastT) / 1000; lastT = now
    S.playhead = Math.min(S.duration, S.playhead + dt)
    S.beatPlayhead = S.playhead * (S.outputDuration / S.duration)
    // follow
    const margin = (S.view.end - S.view.start) * 0.1
    if (S.playhead > S.view.end - margin) {
      const span = S.view.end - S.view.start
      S.view = clampView(S.playhead - margin, S.playhead - margin + span)
    }
    if (S.playhead >= S.duration) { clearInterval(playTimer); playTimer = null }
    draw()
  }, 16)
})

// ── BOOT ─────────────────────────────────────────────────
new ResizeObserver(draw).observe(canvas)
draw()
</script>
</body>
</html>
